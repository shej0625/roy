<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>끝말잇기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #0a0a1a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff; overflow: hidden;
}
#app {
  display: flex; flex-direction: column; height: 100%;
  max-width: 480px; margin: 0 auto;
}
/* Header */
#header {
  padding: 10px 14px 6px; background: #0d0d20;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; border-bottom: 1px solid #2a2a4a;
}
#header h1 { font-size: 1rem; background: linear-gradient(135deg,#a78bfa,#fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.scores { display: flex; gap: 10px; }
.score-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
.score-player { background: #1e3a6a; color: #66aaff; }
.score-cpu    { background: #2a1a4a; color: #cc88ff; }
/* Current word */
#currentWordBox {
  padding: 10px 14px 8px; text-align: center; flex-shrink: 0;
  background: #0d0d20;
}
#currentWord {
  font-size: 1.8rem; font-weight: 900; letter-spacing: 2px;
  min-height: 46px; line-height: 1.2;
}
#currentWord .last-syl { color: #fbbf24; border-bottom: 3px solid #fbbf24; }
#mustStart { font-size: 0.8rem; color: #888; margin-top: 4px; }
#mustStart span { color: #fbbf24; font-weight: 700; }
/* Timer */
#timerRow { padding: 6px 14px; flex-shrink: 0; }
#timerBar { width: 100%; height: 7px; background: #2a2a4a; border-radius: 4px; overflow: hidden; }
#timerFill { height: 100%; width: 100%; border-radius: 4px; background: #44cc66; transition: background 0.4s; }
#timerLabel { font-size: 0.72rem; color: #888; text-align: right; margin-top: 2px; }
/* Chain display */
#chain {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  display: flex; flex-direction: column; gap: 7px;
  scroll-behavior: smooth;
}
.bubble {
  max-width: 72%; padding: 9px 13px; border-radius: 18px;
  font-size: 0.95rem; font-weight: 600; position: relative;
  animation: bubbleIn 0.25s ease;
}
@keyframes bubbleIn {
  from { transform: scale(0.8) translateY(10px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.bubble.player { align-self: flex-end; background: linear-gradient(135deg,#1e4a8a,#2255aa); color: #cce4ff; border-bottom-right-radius: 4px; }
.bubble.cpu    { align-self: flex-start; background: linear-gradient(135deg,#2a1a4a,#3a2060); color: #e0ccff; border-bottom-left-radius: 4px; }
.bubble.system { align-self: center; background: #1e1e3a; color: #aaa; font-size: 0.8rem; font-style: italic; }
.bubble .who { font-size: 0.68rem; opacity: 0.7; margin-bottom: 2px; }
/* Input area */
#inputArea {
  padding: 8px 12px; background: #0d0d20;
  border-top: 1px solid #2a2a4a; flex-shrink: 0;
}
#strikeRow { font-size: 0.8rem; color: #ff6644; min-height: 18px; margin-bottom: 5px; text-align: center; }
.hint-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 7px; }
.hint-btn {
  padding: 5px 10px; border-radius: 20px; border: 1px solid #4a3a70;
  background: #1e1a3a; color: #a78bfa; font-size: 0.8rem; cursor: pointer;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.hint-btn:active { background: #2a2060; }
.input-row { display: flex; gap: 8px; }
#wordInput {
  flex: 1; background: #1a1a2e; border: 1.5px solid #3a3060;
  border-radius: 12px; color: #fff; font-size: 1rem; padding: 10px 14px;
  outline: none;
}
#wordInput:focus { border-color: #a78bfa; }
#submitBtn {
  background: linear-gradient(135deg,#6c63ff,#a78bfa); color: #fff;
  border: none; border-radius: 12px; padding: 10px 18px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#submitBtn:active { transform: scale(0.96); }
/* Overlay */
#overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: rgba(5,5,20,0.92); backdrop-filter: blur(4px);
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
#overlay.show { display: flex; }
.ov-card {
  background: #1a1a2e; border-radius: 20px; padding: 28px 24px;
  width: 90%; max-width: 360px; text-align: center;
  display: flex; flex-direction: column; gap: 12px; align-items: center;
}
.ov-emoji { font-size: 3.5rem; }
.ov-title { font-size: 1.4rem; color: #a78bfa; font-weight: 700; }
.ov-desc  { font-size: 0.9rem; color: #aaa; line-height: 1.5; }
.ov-btn {
  background: linear-gradient(135deg,#6c63ff,#a78bfa); color: #fff;
  border: none; border-radius: 14px; padding: 13px 36px;
  font-size: 1.05rem; font-weight: 700; cursor: pointer; width: 100%;
  -webkit-tap-highlight-color: transparent;
}
.ov-btn:active { transform: scale(0.96); }
.diff-row { display: flex; gap: 10px; }
.diff-btn { flex:1; padding:10px; border-radius:12px; border:2px solid #3a3060; background:#1a1a2e; color:#fff; cursor:pointer; font-size:0.9rem; }
.diff-btn:active { border-color:#a78bfa; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>🗣️ 끝말잇기</h1>
    <div class="scores">
      <span class="score-badge score-player" id="playerScore">나: 0</span>
      <span class="score-badge score-cpu" id="cpuScore">CPU: 0</span>
    </div>
  </div>
  <div id="currentWordBox">
    <div id="currentWord">—</div>
    <div id="mustStart"></div>
  </div>
  <div id="timerRow">
    <div id="timerBar"><div id="timerFill"></div></div>
    <div id="timerLabel">15초</div>
  </div>
  <div id="chain"></div>
  <div id="inputArea">
    <div id="strikeRow"></div>
    <div class="hint-row" id="hintRow"></div>
    <div class="input-row">
      <input type="text" id="wordInput" placeholder="단어를 입력하세요..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="submitBtn" onclick="submitWord()">전송</button>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="ov-card" id="ovCard">
    <div class="ov-emoji" id="ovEmoji">🎮</div>
    <div class="ov-title" id="ovTitle">끝말잇기</div>
    <div class="ov-desc" id="ovDesc"></div>
    <div class="diff-row" id="diffRow">
      <button class="diff-btn" onclick="startGame('easy')">😊 쉬움</button>
      <button class="diff-btn" onclick="startGame('hard')">💪 어려움</button>
    </div>
    <button class="ov-btn" id="ovBtn" style="display:none"></button>
  </div>
</div>

// Build deduplicated word set
const WORD_SET = new Set(WORDS_RAW.filter(w => w.length >= 2));
const WORDS = Array.from(WORD_SET);

// Build index: firstSyl → [words starting with that syl]
const BY_FIRST = {};
WORDS.forEach(w => {
  const syl = w[0];
  if (!BY_FIRST[syl]) BY_FIRST[syl] = [];
  BY_FIRST[syl].push(w);
});

// ─── GAME STATE ─────────────────────────────────────────────────────
let difficulty = 'easy';
let round = 0, playerScore = 0, cpuScore = 0;
let chainHistory = []; // array of words used
let strikes = 0;
let turnTimer = null, timeLeft2 = 15;
let currentTurn = 'player'; // 'player' | 'cpu'
let currentMustStart = '';
let gameActive = false;
let cpuTypeTimer = null;

function getLastSyl(word) { return word[word.length-1]; }
function getFirstSyl(word) { return word[0]; }

function cpuFindWord(mustStart) {
  const candidates = (BY_FIRST[mustStart] || []).filter(w => !chainHistory.includes(w));
  if (candidates.length === 0) return null;
  if (difficulty === 'hard') {
    // Pick longest word
    return candidates.reduce((a,b) => b.length>a.length?b:a);
  } else {
    // Pick shortest
    return candidates.reduce((a,b) => b.length<a.length?b:a);
  }
}

function isValidWord(word) {
  return WORD_SET.has(word);
}

// ─── UI ─────────────────────────────────────────────────────────────
function addBubble(text, who) {
  const chain = document.getElementById('chain');
  const div = document.createElement('div');
  div.className = 'bubble ' + who;
  if (who !== 'system') {
    div.innerHTML = `<div class="who">${who==='player'?'나':'CPU'}</div>${text}`;
  } else { div.textContent = text; }
  chain.appendChild(div);
  chain.scrollTop = chain.scrollHeight;
}

function updateCurrentWord(word) {
  if (!word) {
    document.getElementById('currentWord').innerHTML = '—';
    document.getElementById('mustStart').innerHTML = '';
    return;
  }
  const lastSyl = getLastSyl(word);
  const display = word.slice(0,-1) + `<span class="last-syl">${lastSyl}</span>`;
  document.getElementById('currentWord').innerHTML = display;
  document.getElementById('mustStart').innerHTML = `이 글자로 시작하는 단어: <span>${lastSyl}</span>`;
  currentMustStart = lastSyl;
  updateHints(lastSyl);
}

function updateHints(mustStart) {
  const row = document.getElementById('hintRow');
  row.innerHTML = '';
  const candidates = (BY_FIRST[mustStart] || []).filter(w => !chainHistory.includes(w));
  const picks = candidates.sort(() => Math.random()-0.5).slice(0,4);
  picks.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'hint-btn';
    btn.textContent = w;
    btn.onclick = () => { document.getElementById('wordInput').value = w; submitWord(); };
    row.appendChild(btn);
  });
}

function setTimerColor(t) {
  const pct = t / 15;
  document.getElementById('timerFill').style.width = (pct*100)+'%';
  if (pct < 0.33) { document.getElementById('timerFill').style.background = '#ff4444'; }
  else if (pct < 0.6) { document.getElementById('timerFill').style.background = '#ffaa44'; }
  else { document.getElementById('timerFill').style.background = '#44cc66'; }
  document.getElementById('timerLabel').textContent = t + '초';
}

function startTurnTimer(who) {
  if (turnTimer) clearInterval(turnTimer);
  timeLeft2 = 15;
  setTimerColor(15);
  const inp = document.getElementById('wordInput');
  inp.disabled = who !== 'player';
  document.getElementById('submitBtn').disabled = who !== 'player';
  turnTimer = setInterval(() => {
    timeLeft2--;
    setTimerColor(timeLeft2);
    if (timeLeft2 <= 0) {
      clearInterval(turnTimer);
      if (who === 'player') {
        strikeOut('시간 초과!');
      } else {
        cpuCantAnswer();
      }
    }
  }, 1000);
}

function strikeOut(reason) {
  strikes++;
  document.getElementById('strikeRow').textContent = '❌'.repeat(strikes) + ' ' + reason;
  addBubble(`⚠️ ${reason} (${strikes}/3 패)`, 'system');
  if (strikes >= 3) {
    endRound(false);
  } else {
    // CPU scores
    cpuScore += 5;
    updateScoreboard();
    addBubble('CPU가 점수를 얻었어요!', 'system');
    // CPU takes a turn after a moment
    setTimeout(() => { currentTurn='cpu'; doCpuTurn(); }, 800);
  }
}

function cpuCantAnswer() {
  addBubble('🤔 CPU가 단어를 찾지 못했어요! 플레이어 승리!', 'system');
  playerScore += 10;
  updateScoreboard();
  endRound(true);
}

function updateScoreboard() {
  document.getElementById('playerScore').textContent = '나: ' + playerScore;
  document.getElementById('cpuScore').textContent = 'CPU: ' + cpuScore;
}

function submitWord() {
  if (currentTurn !== 'player' || !gameActive) return;
  const inp = document.getElementById('wordInput');
  const word = inp.value.trim();
  inp.value = '';
  if (!word) return;
  processWord(word, 'player');
}

document.getElementById('wordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitWord();
});

function processWord(word, who) {
  clearInterval(turnTimer);
  // Validate
  if (chainHistory.includes(word)) {
    if (who==='player') { strikeOut('이미 사용한 단어!'); } return;
  }
  if (!isValidWord(word)) {
    if (who==='player') { strikeOut(`"${word}" 는 사전에 없어요!`); } return;
  }
  if (chainHistory.length > 0 && getFirstSyl(word) !== currentMustStart) {
    if (who==='player') { strikeOut(`"${currentMustStart}"(으)로 시작해야 해요!`); } return;
  }
  // Valid
  chainHistory.push(word);
  addBubble(word, who);
  updateCurrentWord(word);
  if (who === 'player') {
    playerScore += 5;
    document.getElementById('strikeRow').textContent = '';
    updateScoreboard();
    currentTurn = 'cpu';
    setTimeout(() => doCpuTurn(), 800 + Math.random()*600);
  } else {
    currentTurn = 'player';
    startTurnTimer('player');
  }
}

function doCpuTurn() {
  startTurnTimer('cpu');
  const word = cpuFindWord(currentMustStart);
  if (!word) {
    // CPU can't find a word
    setTimeout(() => { clearInterval(turnTimer); cpuCantAnswer(); }, 1500);
    return;
  }
  // Typewriter effect
  let i = 0;
  const chain = document.getElementById('chain');
  const div = document.createElement('div');
  div.className = 'bubble cpu';
  div.innerHTML = `<div class="who">CPU</div><span id="cpuTyping"></span>`;
  chain.appendChild(div);
  chain.scrollTop = chain.scrollHeight;

  if (cpuTypeTimer) clearInterval(cpuTypeTimer);
  cpuTypeTimer = setInterval(() => {
    i++;
    document.getElementById('cpuTyping').textContent = word.slice(0,i);
    chain.scrollTop = chain.scrollHeight;
    if (i >= word.length) {
      clearInterval(cpuTypeTimer);
      // Remove the bubble (processWord will add it)
      div.remove();
      processWord(word, 'cpu');
    }
  }, 130);
}

// ─── ROUND / GAME FLOW ───────────────────────────────────────────────
function startRound() {
  chainHistory = [];
  strikes = 0;
  document.getElementById('strikeRow').textContent = '';
  document.getElementById('chain').innerHTML = '';
  document.getElementById('wordInput').value = '';
  gameActive = true;

  // Pick a random starting word for the CPU (first turn is CPU)
  const startWords = ['학교','바다','나무','사과','기차','하늘','물고기','별','강아지','도서관'];
  const starter = startWords[Math.floor(Math.random()*startWords.length)];
  chainHistory.push(starter);
  addBubble(starter, 'cpu');
  updateCurrentWord(starter);
  addBubble(`라운드 ${round+1} 시작! "${getLastSyl(starter)}"로 시작하는 단어를 입력하세요!`, 'system');
  currentTurn = 'player';
  startTurnTimer('player');
}

function endRound(playerWon) {
  gameActive = false;
  if (turnTimer) clearInterval(turnTimer);
  if (cpuTypeTimer) clearInterval(cpuTypeTimer);
  document.getElementById('wordInput').disabled = true;
  document.getElementById('submitBtn').disabled = true;
  setTimerColor(0);

  const msg = playerWon ? '이번 라운드 승리! 🎉' : 'CPU가 이번 라운드 승리... 😅';
  addBubble(msg, 'system');
  round++;

  setTimeout(() => {
    if (round < 3) {
      showOverlay('⚔️', `라운드 ${round}/3 완료`, `다음 라운드로!`, false);
    } else {
      const winner = playerScore > cpuScore ? '플레이어 승리! 🏆' : playerScore < cpuScore ? 'CPU 승리... 🤖' : '무승부! 🤝';
      showOverlay('🏁', '게임 종료', `나: ${playerScore}점 / CPU: ${cpuScore}점\n${winner}`, true);
    }
  }, 600);
}

function showOverlay(emoji, title, desc, isEnd) {
  document.getElementById('ovEmoji').textContent = emoji;
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovDesc').textContent = desc;
  document.getElementById('diffRow').style.display = isEnd ? 'none' : 'none';
  const btn = document.getElementById('ovBtn');
  btn.style.display = 'block';
  if (isEnd) {
    btn.textContent = '다시 하기';
    btn.onclick = () => { location.reload(); };
  } else {
    btn.textContent = '다음 라운드';
    btn.onclick = () => {
      document.getElementById('overlay').classList.remove('show');
      startRound();
    };
  }
  document.getElementById('overlay').classList.add('show');
}

function startGame(diff) {
  difficulty = diff;
  playerScore = 0; cpuScore = 0; round = 0;
  updateScoreboard();
  document.getElementById('overlay').classList.remove('show');
  startRound();
}

// Show start overlay
const startOv = document.getElementById('overlay');
startOv.classList.add('show');
document.getElementById('ovEmoji').textContent = '🗣️';
document.getElementById('ovTitle').textContent = '끝말잇기';
document.getElementById('ovDesc').textContent = 'CPU와 끝말잇기 대결!\n단어의 마지막 글자로 시작하는 새 단어를 입력하세요.';
document.getElementById('diffRow').style.display = 'flex';
document.getElementById('ovBtn').style.display = 'none';
</script>

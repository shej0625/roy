<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>틀린 그림 찾기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; min-height: 100%;
  background: #0a0a1a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff; touch-action: manipulation;
}
#app { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 12px 8px; gap: 10px; }
h1 {
  font-size: 1.4rem;
  background: linear-gradient(135deg, #a78bfa, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#hud {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; max-width: 380px; padding: 8px 14px;
  background: #1a1a2e; border-radius: 12px; font-size: 0.88rem;
}
.hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.hud-label { color: #888; font-size: 0.68rem; }
.hud-val { font-weight: 700; }
#timerBar { width: 100%; max-width: 380px; height: 8px; background: #2a2a4a; border-radius: 4px; overflow: hidden; }
#timerFill { height: 100%; width: 100%; background: linear-gradient(90deg,#22cc66,#66ff88); border-radius: 4px; transition: background 0.5s; }
#canvasRow {
  display: flex; gap: 6px; justify-content: center; align-items: flex-start; width: 100%;
}
.panel-wrap { position: relative; flex-shrink: 0; }
.panel-label {
  text-align: center; font-size: 0.72rem; color: #aaa;
  background: #1a1a2e; padding: 3px 8px; border-radius: 6px 6px 0 0;
}
canvas.panel { display: block; border-radius: 0 0 8px 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
#wrongMarks { font-size: 1.2rem; letter-spacing: 3px; min-height: 22px; text-align: center; }
#roundResult, #finalScreen {
  display: none; flex-direction: column; align-items: center; gap: 16px;
  background: #1a1a2e; border-radius: 20px; padding: 28px 24px;
  width: 100%; max-width: 360px; text-align: center;
}
#roundResult.show, #finalScreen.show { display: flex; }
.big-emoji { font-size: 3.5rem; }
.btn {
  background: linear-gradient(135deg, #6c63ff, #a78bfa); color: #fff;
  border: none; border-radius: 14px; padding: 13px 36px;
  font-size: 1.05rem; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent; width: 100%;
}
.btn:active { transform: scale(0.96); }
.grade { font-size: 2.5rem; font-weight: 900; }
</style>
</head>
<body>
<div id="app">
  <h1>🔍 틀린 그림 찾기</h1>
  <div id="hud">
    <div class="hud-item"><span class="hud-label">라운드</span><span class="hud-val" id="hudRound">1/3</span></div>
    <div class="hud-item"><span class="hud-label">찾은 개수</span><span class="hud-val" id="hudFound">0/5</span></div>
    <div class="hud-item"><span class="hud-label">남은 시간</span><span class="hud-val" id="hudTime">60s</span></div>
  </div>
  <div id="timerBar"><div id="timerFill"></div></div>
  <div id="canvasRow">
    <div class="panel-wrap">
      <div class="panel-label">원본</div>
      <canvas id="canvasL" class="panel" width="170" height="230"></canvas>
    </div>
    <div class="panel-wrap">
      <div class="panel-label">다른 그림</div>
      <canvas id="canvasR" class="panel" width="170" height="230"></canvas>
    </div>
  </div>
  <div id="wrongMarks"></div>
  <div id="roundResult">
    <div class="big-emoji" id="rrEmoji">⭐</div>
    <h2 id="rrTitle">라운드 완료!</h2>
    <p id="rrDesc" style="color:#aaa;font-size:0.9rem"></p>
    <button class="btn" id="rrBtn" onclick="nextRound()">다음 라운드</button>
  </div>
  <div id="finalScreen">
    <div class="big-emoji">🏆</div>
    <h2>최종 결과</h2>
    <div class="grade" id="finalGrade">A</div>
    <p id="finalDesc" style="color:#ccc;font-size:0.95rem"></p>
    <button class="btn" onclick="location.reload()">다시 하기</button>
  </div>
</div>

<script>
const W = 170, H = 230;
const canvasL = document.getElementById('canvasL');
const canvasR = document.getElementById('canvasR');
const ctxL = canvasL.getContext('2d');
const ctxR = canvasR.getContext('2d');

// ─── ROUND DEFINITIONS ──────────────────────────────────────────────
// Each diff: { lx, ly, rx, ry, r }  — location in left panel, location in right panel, radius
// For differences that "exist only on right" or "moved in right", define both sides
// ly/lx = where to click on LEFT to count, rx/ry on RIGHT

const ROUNDS = [
  {
    name: '도시 풍경',
    diffs: [
      { id:0, lx:120, ly:28, rx:120, ry:48, label:'태양 위치' },      // Sun lower in right
      { id:1, lx:88,  ly:108, rx:88, ry:108, label:'창문 색' },       // Middle building window
      { id:2, lx:32,  ly:95,  rx:32, ry:95,  label:'건물 색' },       // Left building color
      { id:3, lx:60,  ly:42,  rx:60, ry:42,  label:'구름 없음' },     // Cloud missing on right
      { id:4, lx:145, ly:60,  rx:145, ry:60, label:'새' }             // Extra bird on right
    ]
  },
  {
    name: '바다 풍경',
    diffs: [
      { id:0, lx:55,  ly:175, rx:55,  ly:175, rx2:55, ry:175, label:'물고기 색' },
      { id:1, lx:112, ly:130, rx:112, ry:130, label:'야자수 잎' },
      { id:2, lx:42,  ly:158, rx:42,  ry:158, label:'보트 줄무늬' },
      { id:3, lx:140, ly:38,  rx:140, ry:38,  label:'구름 추가' },
      { id:4, lx:100, ly:168, rx:115, ry:168, label:'섬 크기' }
    ]
  },
  {
    name: '집 내부',
    diffs: [
      { id:0, lx:130, ly:185, rx:130, ry:185, label:'꽃 색' },
      { id:1, lx:55,  ly:60,  rx:55,  ry:60,  label:'액자 색' },
      { id:2, lx:92,  ly:168, rx:92,  ry:168, label:'책 추가' },
      { id:3, lx:80,  ly:200, rx:80,  ry:200, label:'의자 다리' },
      { id:4, lx:148, ly:108, rx:148, ry:108, label:'전등 켜짐' }
    ]
  }
];

// ─── STATE ──────────────────────────────────────────────────────────
let round = 0, found = [], wrongCount = 0, timeLeft = 60;
let timerInterval = null;
let totalFound = 0;
let feedbacks = []; // {x, y, ok, ttl, canvas (0=L,1=R)}

// ─── DRAWING FUNCTIONS ──────────────────────────────────────────────

function drawRound1Left(c) {
  const g = c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#4a90d9'); g.addColorStop(0.65,'#87ceeb'); g.addColorStop(0.65,'#5a8a3a'); g.addColorStop(1,'#3d6b2a');
  c.fillStyle = g; c.fillRect(0,0,W,H);
  // Buildings
  drawBuilding(c, 15, 70,  45, 130, '#556677');
  drawBuilding(c, 68, 85,  50, 115, '#667788');
  drawBuilding(c, 126,80,  38, 120, '#445566');
  // Sun
  c.fillStyle='#ffe066'; c.shadowColor='#ffcc00'; c.shadowBlur=14;
  c.beginPath(); c.arc(120, 28, 18, 0, Math.PI*2); c.fill(); c.shadowBlur=0;
  // Clouds
  c.fillStyle='#eee'; drawCloudC(c, 40, 38, 30); drawCloudC(c, 95, 52, 22);
}
function drawRound1Right(c) {
  const g = c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#4a90d9'); g.addColorStop(0.65,'#87ceeb'); g.addColorStop(0.65,'#5a8a3a'); g.addColorStop(1,'#3d6b2a');
  c.fillStyle = g; c.fillRect(0,0,W,H);
  // Buildings - diff 2: left building different color (#778 instead of #667)
  drawBuilding(c, 15, 70,  45, 130, '#778899'); // DIFF 2
  drawBuilding(c, 68, 85,  50, 115, '#667788', true); // DIFF 1: window filled
  drawBuilding(c, 126,80,  38, 120, '#445566');
  // Sun - diff 0: lower
  c.fillStyle='#ffe066'; c.shadowColor='#ffcc00'; c.shadowBlur=14;
  c.beginPath(); c.arc(120, 48, 18, 0, Math.PI*2); c.fill(); c.shadowBlur=0; // DIFF 0
  // Clouds - diff 3: missing first cloud
  c.fillStyle='#eee'; drawCloudC(c, 95, 52, 22); // only one cloud
  // Diff 4: extra bird
  c.strokeStyle='#333'; c.lineWidth=1.5;
  c.beginPath(); c.arc(140, 60, 5, Math.PI*0.1, Math.PI*0.9); c.stroke();
  c.beginPath(); c.arc(150, 58, 4, Math.PI*0.1, Math.PI*0.9); c.stroke();
}
function drawBuilding(c, x, y, w, h, color, diffWindow) {
  c.fillStyle = color; c.fillRect(x, y, w, h);
  // Windows
  c.fillStyle = '#fffde0';
  for (let r2=0; r2<3; r2++) for (let col=0; col<2; col++) {
    const wx2 = x + 6 + col*16, wy = y + 10 + r2*28;
    const isDiff = diffWindow && r2===1 && col===0;
    c.fillStyle = isDiff ? '#112233' : '#fffde0';
    c.fillRect(wx2, wy, 10, 10);
  }
}
function drawCloudC(c, x, y, s) {
  c.beginPath(); c.arc(x,y,s,0,Math.PI*2);
  c.arc(x+s*0.7,y-s*0.1,s*0.75,0,Math.PI*2);
  c.arc(x+s*1.3,y,s*0.6,0,Math.PI*2);
  c.fill();
}

function drawRound2Left(c) {
  // Sky
  const g = c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#4ab0e0'); g.addColorStop(0.5,'#87ceeb'); g.addColorStop(0.5,'#1a6ab0'); g.addColorStop(1,'#0d4480');
  c.fillStyle=g; c.fillRect(0,0,W,H);
  // Island
  c.fillStyle='#5a9e3a'; c.beginPath(); c.ellipse(100,142,50,18,0,0,Math.PI*2); c.fill();
  // Palm
  drawPalm(c, 100, 112, false);
  // Boat
  drawBoat(c, 38, 152, '#ff6644');
  // Sun
  c.fillStyle='#ffe066'; c.beginPath(); c.arc(30,28,15,0,Math.PI*2); c.fill();
  // Fish
  c.fillStyle='#ff8844'; drawFish(c, 55,175);
  // Cloud
  c.fillStyle='#eee'; drawCloudC(c, 80,42,18);
}
function drawRound2Right(c) {
  const g = c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#4ab0e0'); g.addColorStop(0.5,'#87ceeb'); g.addColorStop(0.5,'#1a6ab0'); g.addColorStop(1,'#0d4480');
  c.fillStyle=g; c.fillRect(0,0,W,H);
  // Island - diff 4: wider
  c.fillStyle='#5a9e3a'; c.beginPath(); c.ellipse(105,142,62,18,0,0,Math.PI*2); c.fill(); // DIFF4
  // Palm - diff 1: missing a leaf
  drawPalm(c, 100, 112, true); // DIFF1
  // Boat - diff 2: stripe different color
  drawBoat(c, 38, 152, '#4488ff'); // DIFF2
  // Sun
  c.fillStyle='#ffe066'; c.beginPath(); c.arc(30,28,15,0,Math.PI*2); c.fill();
  // Fish - diff 0: different color
  c.fillStyle='#4488ff'; drawFish(c, 55,175); // DIFF0
  // Clouds - diff 3: extra cloud
  c.fillStyle='#eee'; drawCloudC(c, 80,42,18); drawCloudC(c, 140,36,14); // DIFF3
}
function drawPalm(c, x, y, missingLeaf) {
  c.strokeStyle='#8b6914'; c.lineWidth=4; c.lineCap='round';
  c.beginPath(); c.moveTo(x,y+30); c.quadraticCurveTo(x-10,y+10,x,y); c.stroke();
  c.fillStyle='#3da63d';
  if (!missingLeaf) {
    c.beginPath(); c.moveTo(x,y); c.quadraticCurveTo(x-30,y-20,x-35,y-10); c.quadraticCurveTo(x-20,y-5,x,y); c.fill();
  }
  c.beginPath(); c.moveTo(x,y); c.quadraticCurveTo(x+28,y-22,x+32,y-8); c.quadraticCurveTo(x+18,y-4,x,y); c.fill();
  c.beginPath(); c.moveTo(x,y); c.quadraticCurveTo(x-5,y-32,x+8,y-28); c.quadraticCurveTo(x+10,y-15,x,y); c.fill();
}
function drawBoat(c, x, y, stripeColor) {
  c.fillStyle='#e8d5a0';
  c.beginPath(); c.moveTo(x,y); c.lineTo(x+40,y); c.lineTo(x+34,y+14); c.lineTo(x+6,y+14); c.closePath(); c.fill();
  c.fillStyle = stripeColor;
  c.fillRect(x+8,y+2,24,5);
}
function drawFish(c, x, y) {
  c.beginPath(); c.ellipse(x,y,14,7,0,0,Math.PI*2); c.fill();
  c.beginPath(); c.moveTo(x+14,y); c.lineTo(x+22,y-6); c.lineTo(x+22,y+6); c.closePath(); c.fill();
  c.fillStyle='#fff'; c.beginPath(); c.arc(x-5,y-1,2,0,Math.PI*2); c.fill();
  c.fillStyle='#000'; c.beginPath(); c.arc(x-5,y-1,1,0,Math.PI*2); c.fill();
}

function drawRound3Left(c) {
  // Room
  c.fillStyle='#1e1e3a'; c.fillRect(0,0,W,H);
  // Floor
  c.fillStyle='#3a2e1a'; c.fillRect(0,195,W,35);
  // Wall picture
  drawPicture(c, 40, 40, '#aa6633');
  // Window
  drawWindow(c, 120, 30);
  // Table
  c.fillStyle='#6b4a1e'; c.fillRect(60,165,80,14);
  c.fillRect(68,179,8,22); c.fillRect(122,179,8,22);
  // Chair - diff 3: leg color
  drawChair(c, 25,165,'#5a3a12');
  // Lamp
  drawLamp(c, 145,100,true); // on
  // Flower - diff 0
  drawFlower(c, 130, 155, '#ff4488');
}
function drawRound3Right(c) {
  c.fillStyle='#1e1e3a'; c.fillRect(0,0,W,H);
  c.fillStyle='#3a2e1a'; c.fillRect(0,195,W,35);
  // Picture - diff 1: different frame color
  drawPicture(c, 40, 40, '#4488aa'); // DIFF1
  drawWindow(c, 120, 30);
  c.fillStyle='#6b4a1e'; c.fillRect(60,165,80,14);
  c.fillRect(68,179,8,22); c.fillRect(122,179,8,22);
  // Extra book - diff 2
  c.fillStyle='#cc4488'; c.fillRect(88,155,20,10); c.fillStyle='#aa2266'; c.fillRect(88,155,3,10); // DIFF2
  // Chair - diff 3: different leg color
  drawChair(c, 25, 165, '#cc8844'); // DIFF3
  // Lamp - diff 4: off
  drawLamp(c, 145, 100, false); // DIFF4
  // Flower - diff 0
  drawFlower(c, 130, 155, '#44aaff'); // DIFF0
}
function drawPicture(c, x, y, frameColor) {
  c.fillStyle = frameColor; c.fillRect(x,y,55,45);
  c.fillStyle='#b0c8e8'; c.fillRect(x+5,y+5,45,35);
  // simple landscape in picture
  c.fillStyle='#4a8a3a'; c.beginPath(); c.moveTo(x+5,y+40); c.lineTo(x+25,y+20); c.lineTo(x+45,y+35); c.lineTo(x+50,y+40); c.fill();
  c.fillStyle='#ffe066'; c.beginPath(); c.arc(x+42,y+12,7,0,Math.PI*2); c.fill();
}
function drawWindow(c, x, y) {
  c.fillStyle='#6699cc'; c.fillRect(x,y,40,50);
  c.strokeStyle='#cccccc'; c.lineWidth=3;
  c.strokeRect(x,y,40,50);
  c.beginPath(); c.moveTo(x+20,y); c.lineTo(x+20,y+50); c.stroke();
  c.beginPath(); c.moveTo(x,y+25); c.lineTo(x+40,y+25); c.stroke();
}
function drawChair(c, x, y, legColor) {
  c.fillStyle='#7b5c2a'; c.fillRect(x,y-20,30,20); // seat
  c.fillRect(x,y-48,6,28); // back
  c.fillStyle = legColor;
  c.fillRect(x+3,y,5,22); c.fillRect(x+22,y,5,22); // legs
}
function drawLamp(c, x, y, on) {
  c.strokeStyle='#aaa'; c.lineWidth=2;
  c.beginPath(); c.moveTo(x,y); c.lineTo(x,y+50); c.stroke();
  c.fillStyle='#ccaa66'; c.beginPath();
  c.moveTo(x-18,y); c.lineTo(x+18,y); c.lineTo(x+10,y-22); c.lineTo(x-10,y-22); c.closePath(); c.fill();
  // Bulb
  if (on) { c.fillStyle='#ffffaa'; c.shadowColor='#ffff66'; c.shadowBlur=14; }
  else { c.fillStyle='#555'; c.shadowBlur=0; }
  c.beginPath(); c.arc(x, y-8, 7, 0, Math.PI*2); c.fill(); c.shadowBlur=0;
}
function drawFlower(c, x, y, color) {
  c.fillStyle='#4a8a3a'; c.fillRect(x-2,y,4,28);
  for (let a=0; a<5; a++) {
    const ang = a*Math.PI*0.4;
    c.fillStyle = color;
    c.beginPath(); c.ellipse(x+Math.cos(ang)*10, y+Math.sin(ang)*10, 7, 4, ang, 0, Math.PI*2); c.fill();
  }
  c.fillStyle='#ffe066'; c.beginPath(); c.arc(x,y,6,0,Math.PI*2); c.fill();
}

const DRAW_FNS = [
  { left: drawRound1Left, right: drawRound1Right },
  { left: drawRound2Left, right: drawRound2Right },
  { left: drawRound3Left, right: drawRound3Right }
];

// Actual click hit zones (defined relative to their panel)
// For diffs: we store {lx,ly} and {rx,ry} for left and right panel coords
const DIFF_ZONES = [
  [ // Round 1
    { lx:120, ly:28,  rx:120, ry:48,  r:26 },  // sun
    { lx:86,  ly:108, rx:86,  ry:108, r:22 },  // window
    { lx:32,  ly:95,  rx:32,  ry:95,  r:28 },  // building color
    { lx:52,  ly:42,  rx:52,  ry:42,  r:28 },  // cloud
    { lx:144, ly:60,  rx:144, ry:60,  r:24 }   // bird
  ],
  [ // Round 2
    { lx:55,  ly:175, rx:55,  ry:175, r:24 },  // fish color
    { lx:80,  ly:118, rx:80,  ry:118, r:28 },  // palm leaf
    { lx:50,  ly:155, rx:50,  ry:155, r:24 },  // boat stripe
    { lx:140, ly:38,  rx:140, ry:36,  r:24 },  // extra cloud
    { lx:108, ly:145, rx:108, ry:145, r:30 }   // island size
  ],
  [ // Round 3
    { lx:130, ly:150, rx:130, ry:150, r:24 },  // flower
    { lx:68,  ly:60,  rx:68,  ry:60,  r:32 },  // picture frame
    { lx:100, ly:160, rx:100, ry:160, r:28 },  // book
    { lx:30,  ly:190, rx:30,  ry:190, r:26 },  // chair leg
    { lx:145, ly:105, rx:145, ry:105, r:24 }   // lamp
  ]
];

// ─── GAME LOGIC ─────────────────────────────────────────────────────
function initRound() {
  found = new Array(5).fill(false);
  wrongCount = 0;
  timeLeft = 60;
  feedbacks = [];
  document.getElementById('wrongMarks').textContent = '';
  document.getElementById('roundResult').classList.remove('show');
  document.getElementById('finalScreen').classList.remove('show');
  updateHUD();
  drawPanels();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
}

function tick() {
  timeLeft--;
  updateHUD();
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    endRound();
  }
}

function updateHUD() {
  document.getElementById('hudRound').textContent = (round+1) + '/3';
  document.getElementById('hudFound').textContent = found.filter(Boolean).length + '/5';
  document.getElementById('hudTime').textContent = timeLeft + 's';
  const pct = timeLeft / 60;
  document.getElementById('timerFill').style.width = (pct*100) + '%';
  if (pct < 0.25) { document.getElementById('timerFill').style.background = '#ff4444'; }
  else if (pct < 0.5) { document.getElementById('timerFill').style.background = 'linear-gradient(90deg,#ff8844,#ffcc44)'; }
  else { document.getElementById('timerFill').style.background = 'linear-gradient(90deg,#22cc66,#66ff88)'; }
}

function drawPanels() {
  ctxL.clearRect(0,0,W,H); ctxR.clearRect(0,0,W,H);
  DRAW_FNS[round].left(ctxL);
  DRAW_FNS[round].right(ctxR);
  // Draw found markers
  const zones = DIFF_ZONES[round];
  found.forEach((f, i) => {
    if (!f) return;
    const z = zones[i];
    drawFoundCircle(ctxL, z.lx, z.ly, z.r);
    drawFoundCircle(ctxR, z.rx, z.ry, z.r);
  });
  // Draw feedbacks
  const now = performance.now();
  feedbacks = feedbacks.filter(fb => now - fb.ts < 700);
  feedbacks.forEach(fb => {
    const ctx2 = fb.panel === 0 ? ctxL : ctxR;
    const t = (now - fb.ts) / 700;
    ctx2.globalAlpha = 1 - t;
    if (fb.ok) {
      ctx2.strokeStyle = '#44ff88'; ctx2.lineWidth = 3;
      ctx2.beginPath(); ctx2.arc(fb.x, fb.y, 18+t*8, 0, Math.PI*2); ctx2.stroke();
    } else {
      ctx2.strokeStyle = '#ff4444'; ctx2.lineWidth = 3;
      const s = 12;
      ctx2.beginPath(); ctx2.moveTo(fb.x-s,fb.y-s); ctx2.lineTo(fb.x+s,fb.y+s); ctx2.stroke();
      ctx2.beginPath(); ctx2.moveTo(fb.x+s,fb.y-s); ctx2.lineTo(fb.x-s,fb.y+s); ctx2.stroke();
    }
    ctx2.globalAlpha = 1;
  });
}

function drawFoundCircle(c, x, y, r) {
  c.strokeStyle = '#44ff88'; c.lineWidth = 3;
  c.shadowColor = '#44ff88'; c.shadowBlur = 8;
  c.beginPath(); c.arc(x, y, r, 0, Math.PI*2); c.stroke();
  c.shadowBlur = 0;
}

function handleTap(panel, x, y) {
  if (timeLeft <= 0) return;
  const zones = DIFF_ZONES[round];
  let hit = -1;
  for (let i = 0; i < zones.length; i++) {
    if (found[i]) continue;
    const z = zones[i];
    const zx = panel === 0 ? z.lx : z.rx;
    const zy = panel === 0 ? z.ly : z.ry;
    const dist = Math.sqrt((x-zx)**2 + (y-zy)**2);
    if (dist <= z.r + 10) { hit = i; break; }
  }
  if (hit >= 0) {
    found[hit] = true;
    feedbacks.push({ panel, x, y, ok:true, ts:performance.now() });
    updateHUD();
    if (found.every(Boolean)) {
      clearInterval(timerInterval);
      setTimeout(endRound, 400);
    }
  } else {
    wrongCount++;
    feedbacks.push({ panel, x, y, ok:false, ts:performance.now() });
    document.getElementById('wrongMarks').textContent = '❌'.repeat(Math.min(wrongCount, 5));
    if (wrongCount >= 5) {
      clearInterval(timerInterval);
      setTimeout(endRound, 400);
    }
  }
  drawPanels();
}

// Panel click handlers
function makeTapHandler(panel, cvs) {
  cvs.addEventListener('click', e => {
    const rect = cvs.getBoundingClientRect();
    const scaleX = W / rect.width, scaleY = H / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    handleTap(panel, x, y);
  });
  cvs.addEventListener('touchend', e => {
    e.preventDefault();
    const rect = cvs.getBoundingClientRect();
    const scaleX = W / rect.width, scaleY = H / rect.height;
    const t = e.changedTouches[0];
    const x = (t.clientX - rect.left) * scaleX;
    const y = (t.clientY - rect.top) * scaleY;
    handleTap(panel, x, y);
  }, { passive: false });
}
makeTapHandler(0, canvasL);
makeTapHandler(1, canvasR);

// Redraw loop for feedback animations
let rafFb = null;
function fbLoop() {
  if (feedbacks.length > 0) drawPanels();
  rafFb = requestAnimationFrame(fbLoop);
}
rafFb = requestAnimationFrame(fbLoop);

function endRound() {
  clearInterval(timerInterval);
  const foundCount = found.filter(Boolean).length;
  totalFound += foundCount;
  const rr = document.getElementById('roundResult');
  document.getElementById('rrEmoji').textContent = foundCount===5?'⭐': foundCount>=3?'👍':'😅';
  document.getElementById('rrTitle').textContent = `라운드 ${round+1} 완료!`;
  document.getElementById('rrDesc').textContent = `${foundCount}/5 개 발견 · 오답 ${wrongCount}회`;
  const isLast = round >= 2;
  document.getElementById('rrBtn').textContent = isLast ? '결과 보기' : '다음 라운드';
  rr.classList.add('show');
}

function nextRound() {
  document.getElementById('roundResult').classList.remove('show');
  round++;
  if (round >= 3) {
    showFinal();
  } else {
    initRound();
  }
}

function showFinal() {
  const grade = totalFound >= 13 ? 'A' : totalFound >= 10 ? 'B' : totalFound >= 7 ? 'C' : 'D';
  const gradeColor = grade==='A'?'#fbbf24': grade==='B'?'#a78bfa': grade==='C'?'#4488ff':'#ff6644';
  document.getElementById('finalGrade').textContent = grade;
  document.getElementById('finalGrade').style.color = gradeColor;
  document.getElementById('finalDesc').textContent = `총 ${totalFound}/15개 발견`;
  document.getElementById('finalScreen').classList.add('show');
  document.getElementById('roundResult').classList.remove('show');
  cancelAnimationFrame(rafFb);
}

// Scale canvases for mobile
function sizeCanvases() {
  const maxW = Math.min(window.innerWidth - 20, 400);
  const panelW = Math.floor((maxW - 6) / 2);
  const scale = panelW / W;
  [canvasL, canvasR].forEach(cv => {
    cv.style.width  = panelW + 'px';
    cv.style.height = Math.floor(H * scale) + 'px';
  });
}
sizeCanvases();
window.addEventListener('resize', sizeCanvases);

// Start
initRound();
</script>

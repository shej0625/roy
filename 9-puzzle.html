<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>슬라이딩 퍼즐</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f1a; color: #fff;
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center; padding: 16px;
    user-select: none;
  }
  .back { align-self: flex-start; color: #63b3ff; text-decoration: none; font-size: 0.9rem; margin-bottom: 14px; }
  h1 { font-size: 1.5rem; margin-bottom: 6px; }
  .desc { color: #888; font-size: 0.8rem; margin-bottom: 16px; }
  .hud { display: flex; gap: 12px; margin-bottom: 16px; width: 100%; max-width: 360px; }
  .hud-box { background: #1a1a2e; border-radius: 12px; padding: 10px; text-align: center; flex: 1; border: 1px solid #2a2a4a; }
  .hud-val { font-size: 1.4rem; font-weight: 700; color: #63b3ff; }
  .hud-label { font-size: 0.65rem; color: #888; }
  .size-toggle { display: flex; background: #1a1a2e; border-radius: 10px; padding: 4px; gap: 4px; margin-bottom: 14px; border: 1px solid #2a2a4a; }
  .size-btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; background: transparent; color: #888; }
  .size-btn.active { background: #63b3ff; color: #0f0f1a; }
  .puzzle-grid {
    display: grid;
    gap: 6px;
    width: 100%; max-width: 360px;
    margin-bottom: 16px;
  }
  .tile {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 800;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s;
    border: 2px solid;
  }
  .tile.number { background: #16213e; border-color: #63b3ff44; color: #63b3ff; }
  .tile.number:active { transform: scale(0.92); }
  .tile.empty { background: #0a0a18; border-color: #1a1a2e; cursor: default; }
  .tile.in-place { background: #003333; border-color: #63ff84; color: #63ff84; }
  .btn { padding: 12px 28px; border-radius: 12px; border: none; font-size: 0.95rem; font-weight: 600; background: linear-gradient(135deg, #63b3ff, #6c63ff); color: #fff; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .win-msg { font-size: 1.1rem; font-weight: 700; color: #63ff84; text-align: center; min-height: 28px; margin-bottom: 10px; }
</style>
</head>
<body>
<a class="back" href="index.html">← 게임 목록</a>
<h1>🧩 슬라이딩 퍼즐</h1>
<p class="desc">숫자를 1부터 순서대로 맞춰보세요!</p>
<div class="size-toggle">
  <button class="size-btn active" id="btn3x3">3×3</button>
  <button class="size-btn" id="btn4x4">4×4</button>
</div>
<div class="hud">
  <div class="hud-box"><div class="hud-val" id="movesEl">0</div><div class="hud-label">이동 횟수</div></div>
  <div class="hud-box"><div class="hud-val" id="timerEl">0</div><div class="hud-label">시간(초)</div></div>
  <div class="hud-box"><div class="hud-val" id="bestEl">-</div><div class="hud-label">최고 기록</div></div>
</div>
<div class="puzzle-grid" id="puzzleGrid"></div>
<div class="win-msg" id="winMsg"></div>
<button class="btn" id="shuffleBtn">섞기 / 새 게임</button>

<script>
let size = 3, tiles = [], emptyIdx = size * size - 1;
let moves = 0, timerSec = 0, timerInterval = null, started = false;
let bests = { 3: Infinity, 4: Infinity };

const grid = document.getElementById('puzzleGrid');

function initPuzzle() {
  tiles = Array.from({length: size * size}, (_, i) => i < size * size - 1 ? i + 1 : 0);
  emptyIdx = size * size - 1;
  moves = 0; timerSec = 0; started = false;
  document.getElementById('movesEl').textContent = 0;
  document.getElementById('timerEl').textContent = 0;
  clearInterval(timerInterval);
  document.getElementById('winMsg').textContent = '';
  shuffle();
  render();
}

function shuffle() {
  for (let i = 0; i < 200; i++) {
    const neighbors = getMovable();
    const pick = neighbors[Math.floor(Math.random() * neighbors.length)];
    swap(pick);
  }
  emptyIdx = tiles.indexOf(0);
}

function getMovable() {
  const movable = [];
  const row = Math.floor(emptyIdx / size), col = emptyIdx % size;
  if (row > 0) movable.push(emptyIdx - size);
  if (row < size - 1) movable.push(emptyIdx + size);
  if (col > 0) movable.push(emptyIdx - 1);
  if (col < size - 1) movable.push(emptyIdx + 1);
  return movable;
}

function swap(i) {
  [tiles[emptyIdx], tiles[i]] = [tiles[i], tiles[emptyIdx]];
  emptyIdx = i;
}

function render() {
  grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  grid.innerHTML = '';
  tiles.forEach((val, i) => {
    const tile = document.createElement('div');
    const isCorrect = val !== 0 && val === i + 1;
    tile.className = `tile ${val === 0 ? 'empty' : isCorrect ? 'in-place' : 'number'}`;
    tile.textContent = val === 0 ? '' : val;
    if (size === 4) tile.style.fontSize = '1.2rem';
    if (val !== 0) {
      tile.addEventListener('click', () => tryMove(i));
      tile.addEventListener('touchend', e => { e.preventDefault(); tryMove(i); });
    }
    grid.appendChild(tile);
  });
}

function tryMove(i) {
  const neighbors = getMovable();
  if (!neighbors.includes(i)) return;
  if (!started) {
    started = true;
    timerInterval = setInterval(() => {
      timerSec++;
      document.getElementById('timerEl').textContent = timerSec;
    }, 1000);
  }
  swap(i);
  moves++;
  document.getElementById('movesEl').textContent = moves;
  render();
  if (isSolved()) winGame();
}

function isSolved() {
  return tiles.every((v, i) => i === size * size - 1 ? v === 0 : v === i + 1);
}

function winGame() {
  clearInterval(timerInterval);
  if (timerSec < (bests[size] || Infinity)) {
    bests[size] = timerSec;
    document.getElementById('bestEl').textContent = timerSec + 's';
  }
  document.getElementById('winMsg').textContent = `🎉 완성! ${moves}회 이동, ${timerSec}초`;
}

document.getElementById('shuffleBtn').addEventListener('click', initPuzzle);
document.getElementById('btn3x3').addEventListener('click', () => {
  size = 3;
  document.getElementById('btn3x3').classList.add('active');
  document.getElementById('btn4x4').classList.remove('active');
  document.getElementById('bestEl').textContent = bests[3] === Infinity ? '-' : bests[3] + 's';
  initPuzzle();
});
document.getElementById('btn4x4').addEventListener('click', () => {
  size = 4;
  document.getElementById('btn4x4').classList.add('active');
  document.getElementById('btn3x3').classList.remove('active');
  document.getElementById('bestEl').textContent = bests[4] === Infinity ? '-' : bests[4] + 's';
  initPuzzle();
});

initPuzzle();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>땅따먹기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #0a0a1e;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff; touch-action: none; user-select: none;
}
#wrap { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
#hud {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 12px; background: rgba(0,0,0,0.65);
  font-size: 0.82rem; pointer-events: none;
}
.hv { font-weight: 700; font-size: 0.95rem; }
#gameCanvas { display: block; position: absolute; top: 0; left: 0; }
/* D-pad */
#dpad {
  position: absolute; bottom: 16px; right: 16px; z-index: 20;
  width: 150px; height: 150px;
}
.dpad-btn {
  position: absolute; width: 46px; height: 46px;
  background: rgba(100,90,200,0.55); border: 2px solid rgba(167,139,250,0.6);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.dpad-btn:active, .dpad-btn.pressed { background: rgba(167,139,250,0.75); }
#dUp    { top:0;    left:52px; }
#dDown  { top:104px; left:52px; }
#dLeft  { top:52px; left:0; }
#dRight { top:52px; left:104px; }
/* Overlay */
#overlay {
  display: none; position: absolute; inset: 0; z-index: 30;
  background: rgba(5,5,20,0.88); backdrop-filter: blur(4px);
  flex-direction: column; align-items: center; justify-content: center; gap: 18px;
}
#overlay.show { display: flex; }
#overlay .big { font-size: 4rem; }
#overlay h2 { font-size: 1.5rem; color: #a78bfa; }
#overlay p { color: #ccc; font-size: 0.95rem; text-align: center; padding: 0 20px; }
#overlay button {
  background: linear-gradient(135deg, #6c63ff, #a78bfa); color: #fff;
  border: none; border-radius: 14px; padding: 13px 40px;
  font-size: 1.05rem; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#overlay button:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <span>레벨 <span class="hv" id="hudLevel">1</span></span>
    <span>영역 <span class="hv" id="hudPct">0%</span></span>
    <span>생명 <span class="hv" id="hudLives">❤️❤️❤️</span></span>
  </div>
  <div id="dpad">
    <div class="dpad-btn" id="dUp" data-dir="0,-1">▲</div>
    <div class="dpad-btn" id="dDown" data-dir="0,1">▼</div>
    <div class="dpad-btn" id="dLeft" data-dir="-1,0">◀</div>
    <div class="dpad-btn" id="dRight" data-dir="1,0">▶</div>
  </div>
  <div id="overlay">
    <div class="big" id="ovEmoji">🎮</div>
    <h2 id="ovTitle">땅따먹기</h2>
    <p id="ovDesc">선을 그어 영역을 차지하세요!<br>75% 이상 차지하면 클리어!</p>
    <button id="ovBtn">시작!</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

// Grid dimensions
const HUD_HEIGHT = 36;
const AVAILABLE_H = canvas.height - HUD_HEIGHT;
const CELL = Math.min(Math.floor(canvas.width / 60), Math.floor(AVAILABLE_H / 80), 8);
const COLS = Math.floor(canvas.width / CELL);
const ROWS = Math.floor(AVAILABLE_H / CELL);
const GRID_W = COLS * CELL;
const GRID_H = ROWS * CELL;
const GRID_OX = Math.floor((canvas.width - GRID_W) / 2);
const GRID_OY = HUD_HEIGHT + Math.floor((AVAILABLE_H - GRID_H) / 2);

// Cell states
const EMPTY   = 0;
const CLAIMED = 1;
const TRAIL   = 2;

let grid = [];
let player = { col:0, row:0, dir:{dx:0,dy:0}, moving:false, nextDir:null };
let enemies = [];
let lives = 3, level = 1, gameOver2 = false, levelWon = false;
let moveTimer = 0;
const MOVE_INTERVAL = 0.08; // seconds per cell
let lastTS2 = 0, rafId2 = null;
let totalCells = 0;

function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid.push(new Array(COLS).fill(EMPTY));
  }
  // Claim border
  for (let c = 0; c < COLS; c++) { grid[0][c] = CLAIMED; grid[ROWS-1][c] = CLAIMED; }
  for (let r = 0; r < ROWS; r++) { grid[r][0] = CLAIMED; grid[r][COLS-1] = CLAIMED; }
  totalCells = COLS * ROWS;
}

function initLevel() {
  initGrid();
  player = { col:2, row:0, dir:{dx:1,dy:0}, moving:false, nextDir:null };
  enemies = [];
  const numEnemies = level + 1; // level1=2, level2=3, level3=4
  for (let i = 0; i < numEnemies; i++) {
    enemies.push({
      px: GRID_OX + Math.floor(COLS/2 + (i-1)*8)*CELL + CELL/2,
      py: GRID_OY + Math.floor(ROWS/2)*CELL + CELL/2,
      vx: (i%2===0?1:-1) * (100+i*20),
      vy: (i%3===0?1:-1) * (90+i*15)
    });
  }
  moveTimer = 0;
  gameOver2 = false; levelWon = false;
  document.getElementById('hudLevel').textContent = level;
  updateHUD();
}

function cellClaimed() { return grid.flat().filter(c => c===CLAIMED).length; }
function pct() { return Math.round(cellClaimed() / totalCells * 100); }
function updateHUD() {
  document.getElementById('hudPct').textContent = pct() + '%';
  document.getElementById('hudLives').textContent = '❤️'.repeat(Math.max(0,lives));
}

// ─── FLOOD FILL ─────────────────────────────────────────────────────
function floodFill() {
  // Mark trail as temporary barrier, then flood from outside (unclaimed)
  // Any EMPTY cell reachable from enemies is "outside" – the rest get claimed
  // Use BFS from each enemy position
  const visited = Array.from({length:ROWS}, () => new Array(COLS).fill(false));
  const queue = [];

  // Start flood from enemy positions
  enemies.forEach(en => {
    const ec = Math.floor((en.px - GRID_OX) / CELL);
    const er = Math.floor((en.py - GRID_OY) / CELL);
    if (ec>=0&&ec<COLS&&er>=0&&er<ROWS&&grid[er][ec]===EMPTY&&!visited[er][ec]) {
      visited[er][ec] = true; queue.push([ec,er]);
    }
  });
  // Also seed from all border empty cells not already claimed
  for (let c=0; c<COLS; c++) for (let r=0; r<ROWS; r++) {
    if ((c===0||c===COLS-1||r===0||r===ROWS-1) && grid[r][c]===EMPTY && !visited[r][c]) {
      visited[r][c]=true; queue.push([c,r]);
    }
  }

  let qi = 0;
  while (qi < queue.length) {
    const [c,r] = queue[qi++];
    const dirs2 = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dc,dr] of dirs2) {
      const nc=c+dc, nr=r+dr;
      if (nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
      if (visited[nr][nc]) continue;
      if (grid[nr][nc]!==EMPTY) continue;
      visited[nr][nc]=true;
      queue.push([nc,nr]);
    }
  }

  // Claim all EMPTY cells NOT visited (enclosed)
  let newlyClaimed = 0;
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    if (grid[r][c]===TRAIL) { grid[r][c]=CLAIMED; newlyClaimed++; }
    else if (grid[r][c]===EMPTY && !visited[r][c]) { grid[r][c]=CLAIMED; newlyClaimed++; }
  }
  updateHUD();
}

// ─── UPDATE ─────────────────────────────────────────────────────────
function update(dt) {
  if (gameOver2 || levelWon) return;

  // Apply next direction if queued
  if (player.nextDir) {
    const nd = player.nextDir;
    // Can switch to perpendicular immediately, or same axis
    player.dir = nd;
    player.nextDir = null;
  }

  // Enemy movement (pixel-based, bounce off claimed region)
  enemies.forEach(en => {
    en.px += en.vx * dt;
    en.py += en.vy * dt;
    // Bounds
    if (en.px < GRID_OX + CELL/2)           { en.px = GRID_OX + CELL/2; en.vx = Math.abs(en.vx); }
    if (en.px > GRID_OX + GRID_W - CELL/2)  { en.px = GRID_OX + GRID_W - CELL/2; en.vx = -Math.abs(en.vx); }
    if (en.py < GRID_OY + CELL/2)           { en.py = GRID_OY + CELL/2; en.vy = Math.abs(en.vy); }
    if (en.py > GRID_OY + GRID_H - CELL/2)  { en.py = GRID_OY + GRID_H - CELL/2; en.vy = -Math.abs(en.vy); }
    // Bounce off claimed cells (enemy stays in empty area)
    const ec = Math.floor((en.px - GRID_OX) / CELL);
    const er = Math.floor((en.py - GRID_OY) / CELL);
    if (ec>=0&&ec<COLS&&er>=0&&er<ROWS) {
      const cell = grid[er][ec];
      if (cell===CLAIMED) {
        en.vx *= -1; en.vy *= -1;
        en.px += en.vx * dt * 2;
        en.py += en.vy * dt * 2;
      }
    }
    // Check enemy vs trail → kill player
    for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
      if (grid[r][c]!==TRAIL) continue;
      const tx = GRID_OX + c*CELL + CELL/2;
      const ty = GRID_OY + r*CELL + CELL/2;
      const dx = en.px-tx, dy = en.py-ty;
      if (Math.sqrt(dx*dx+dy*dy) < CELL) { loseLife(); return; }
    }
  });

  // Player movement on grid
  moveTimer -= dt;
  if (moveTimer > 0) return;
  moveTimer = MOVE_INTERVAL;

  if (player.dir.dx===0 && player.dir.dy===0) return;

  const nc = player.col + player.dir.dx;
  const nr = player.row + player.dir.dy;
  if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) {
    player.dir = {dx:0,dy:0}; return;
  }

  const prevCell = grid[player.row][player.col];
  const nextCell = grid[nr][nc];

  if (nextCell === TRAIL) {
    // Self-collision
    loseLife(); return;
  }

  if (prevCell === CLAIMED && nextCell === EMPTY) {
    // Start trail
    grid[nr][nc] = TRAIL;
  } else if (prevCell === TRAIL && nextCell === EMPTY) {
    // Continue trail
    grid[nr][nc] = TRAIL;
  } else if (prevCell === TRAIL && nextCell === CLAIMED) {
    // Close the loop!
    floodFill();
  } else if (prevCell === CLAIMED && nextCell === CLAIMED) {
    // Move on claimed land freely
  }

  player.col = nc;
  player.row = nr;

  // Check win condition
  if (pct() >= 75) {
    levelWon = true;
    setTimeout(() => {
      if (level < 3) {
        showOverlay('🎉','레벨 클리어!',`${pct()}% 차지했어요!`,()=>{level++;initLevel();});
      } else {
        showOverlay('🏆','게임 클리어!','3레벨 모두 완료!',()=>{level=1;lives=3;initLevel();});
      }
    }, 300);
  }

  // Check enemy vs player position
  enemies.forEach(en => {
    const px2 = GRID_OX + player.col*CELL + CELL/2;
    const py2 = GRID_OY + player.row*CELL + CELL/2;
    const dx = en.px-px2, dy = en.py-py2;
    if (Math.sqrt(dx*dx+dy*dy) < CELL) loseLife();
  });
}

function loseLife() {
  if (gameOver2) return;
  // Remove all trails
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    if (grid[r][c]===TRAIL) grid[r][c]=EMPTY;
  }
  lives--;
  updateHUD();
  if (lives <= 0) {
    gameOver2 = true;
    setTimeout(() => showOverlay('💔','게임 오버',`${pct()}% 차지했어요`,()=>{lives=3;level=1;initLevel();}), 300);
  } else {
    // Reset player to safe zone
    player = { col:2, row:0, dir:{dx:0,dy:0}, moving:false, nextDir:null };
  }
}

function showOverlay(emoji, title, desc, callback) {
  document.getElementById('ovEmoji').textContent = emoji;
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovDesc').textContent = desc;
  const ov = document.getElementById('overlay');
  ov.classList.add('show');
  const btn = document.getElementById('ovBtn');
  btn.textContent = '계속';
  btn.onclick = () => { ov.classList.remove('show'); callback(); };
}

// ─── DRAW ────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0a0a1e'; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Draw grid
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const x = GRID_OX + c*CELL, y = GRID_OY + r*CELL;
      const state = grid[r][c];
      if (state===CLAIMED) {
        const g = ctx.createLinearGradient(x,y,x+CELL,y+CELL);
        g.addColorStop(0,'#6c63ff44'); g.addColorStop(1,'#a78bfa44');
        ctx.fillStyle = g; ctx.fillRect(x,y,CELL,CELL);
        ctx.strokeStyle='#6c63ff22'; ctx.lineWidth=0.5;
        ctx.strokeRect(x,y,CELL,CELL);
      } else if (state===TRAIL) {
        ctx.fillStyle='#ffcc00'; ctx.fillRect(x,y,CELL,CELL);
        ctx.strokeStyle='#ff8800'; ctx.lineWidth=0.5; ctx.strokeRect(x,y,CELL,CELL);
      } else {
        ctx.fillStyle='#1a1a2e'; ctx.fillRect(x,y,CELL,CELL);
      }
    }
  }

  // Grid border
  ctx.strokeStyle='#3a3060'; ctx.lineWidth=1;
  ctx.strokeRect(GRID_OX, GRID_OY, GRID_W, GRID_H);

  // Enemies
  enemies.forEach((en,i) => {
    const colors = ['#ff4444','#ff8844','#ff44aa','#ee44ff'];
    ctx.shadowColor = colors[i%colors.length]; ctx.shadowBlur = 10;
    ctx.fillStyle = colors[i%colors.length];
    ctx.beginPath(); ctx.arc(en.px, en.py, CELL*0.75, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font=`${CELL}px serif`; ctx.textAlign='center';
    ctx.fillText('•', en.px, en.py+CELL*0.3);
  });

  // Player
  const px = GRID_OX + player.col*CELL + CELL/2;
  const py = GRID_OY + player.row*CELL + CELL/2;
  ctx.shadowColor='#fff'; ctx.shadowBlur=10;
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(px, py, CELL*0.7, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

function gameLoop(ts) {
  const dt = Math.min((ts-lastTS2)/1000, 0.05);
  lastTS2=ts;
  update(dt);
  draw();
  rafId2=requestAnimationFrame(gameLoop);
}

// ─── INPUT ──────────────────────────────────────────────────────────
const DIRS = { '0,-1':{dx:0,dy:-1}, '0,1':{dx:0,dy:1}, '-1,0':{dx:-1,dy:0}, '1,0':{dx:1,dy:0} };
document.querySelectorAll('.dpad-btn').forEach(btn => {
  btn.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    const d = DIRS[btn.dataset.dir];
    if (d) { player.dir=d; player.nextDir=null; }
    btn.classList.add('pressed');
  }, {passive:false});
  btn.addEventListener('touchend', e => { e.preventDefault(); btn.classList.remove('pressed'); }, {passive:false});
  btn.addEventListener('mousedown', e => {
    const d = DIRS[btn.dataset.dir];
    if (d) { player.dir=d; player.nextDir=null; }
    btn.classList.add('pressed');
  });
  btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
});

document.addEventListener('keydown', e => {
  const map = { ArrowUp:{dx:0,dy:-1}, ArrowDown:{dx:0,dy:1}, ArrowLeft:{dx:-1,dy:0}, ArrowRight:{dx:1,dy:0},
                KeyW:{dx:0,dy:-1}, KeyS:{dx:0,dy:1}, KeyA:{dx:-1,dy:0}, KeyD:{dx:1,dy:0} };
  const d = map[e.code];
  if (d) { player.dir=d; player.nextDir=null; e.preventDefault(); }
});

// Swipe detection
let swipeStart = null;
canvas.addEventListener('touchstart', e => {
  swipeStart = { x:e.touches[0].clientX, y:e.touches[0].clientY };
}, {passive:true});
canvas.addEventListener('touchend', e => {
  if (!swipeStart) return;
  const dx = e.changedTouches[0].clientX - swipeStart.x;
  const dy = e.changedTouches[0].clientY - swipeStart.y;
  swipeStart = null;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    player.dir = dx>0?{dx:1,dy:0}:{dx:-1,dy:0};
  } else {
    player.dir = dy>0?{dx:0,dy:1}:{dx:0,dy:-1};
  }
}, {passive:true});

// ─── START ───────────────────────────────────────────────────────────
initLevel();
const ov2 = document.getElementById('overlay');
ov2.classList.add('show');
document.getElementById('ovBtn').onclick = () => {
  ov2.classList.remove('show');
  lastTS2 = performance.now();
  rafId2 = requestAnimationFrame(gameLoop);
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>두더지 잡기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f1a; color: #fff;
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center;
    padding: 16px; user-select: none;
  }
  .back { align-self: flex-start; color: #63ff84; text-decoration: none; font-size: 0.9rem; margin-bottom: 14px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .info-bar {
    display: flex; gap: 20px; margin: 14px 0;
    width: 100%; max-width: 360px; justify-content: center;
  }
  .info-box {
    background: #1a1a2e; border-radius: 12px; padding: 10px 18px;
    text-align: center; border: 1px solid #2a2a4a; flex: 1;
  }
  .info-val { font-size: 1.6rem; font-weight: 700; color: #63ff84; }
  .info-label { font-size: 0.7rem; color: #888; }
  .grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; width: 100%; max-width: 360px; margin-bottom: 20px;
  }
  .hole {
    aspect-ratio: 1;
    background: #1a1a2e;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem;
    border: 3px solid #2a2a4a;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
    transition: border-color 0.1s;
  }
  .hole.active { border-color: #63ff84; }
  .hole.hit { border-color: #ff6363; animation: hitAnim 0.2s; }
  @keyframes hitAnim {
    0% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .mole { transition: transform 0.15s; transform: translateY(0); }
  .mole.hidden { transform: translateY(120%); }
  .start-btn {
    padding: 14px 40px; border-radius: 12px; border: none;
    font-size: 1.1rem; font-weight: 600;
    background: linear-gradient(135deg, #63ff84, #63d4ff);
    color: #0f0f1a; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .time-bar-wrap {
    width: 100%; max-width: 360px; background: #1a1a2e;
    border-radius: 8px; height: 10px; margin-bottom: 16px;
    border: 1px solid #2a2a4a;
  }
  .time-bar { height: 100%; background: linear-gradient(90deg, #63ff84, #ff6363); border-radius: 8px; transition: width 0.5s linear; }
  .overlay {
    position: fixed; inset: 0;
    background: #0f0f1aee;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
  }
  .overlay.hidden { display: none; }
  .overlay-emoji { font-size: 4rem; }
  .overlay-title { font-size: 1.6rem; font-weight: 700; }
  .overlay-score { font-size: 1.1rem; color: #63ff84; }
</style>
</head>
<body>
<a class="back" href="index.html">← 게임 목록</a>
<h1>🐹 두더지 잡기</h1>
<div class="info-bar">
  <div class="info-box"><div class="info-val" id="scoreEl">0</div><div class="info-label">점수</div></div>
  <div class="info-box"><div class="info-val" id="timeEl">30</div><div class="info-label">남은 시간</div></div>
  <div class="info-box"><div class="info-val" id="missEl">0</div><div class="info-label">놓침</div></div>
</div>
<div class="time-bar-wrap"><div class="time-bar" id="timeBar" style="width:100%"></div></div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="overlay-emoji">🎮</div>
  <div class="overlay-title">두더지 잡기</div>
  <div class="overlay-score">30초 안에 최대한 잡으세요!</div>
  <button class="start-btn" id="startBtn">시작!</button>
</div>

<script>
const GAME_TIME = 30;
let score = 0, miss = 0, timeLeft = GAME_TIME;
let gameRunning = false;
let moleTimer = null, countdownTimer = null;
let activeMole = -1;
let moleTimeout = null;

const holes = [];
const grid = document.getElementById('grid');

for (let i = 0; i < 9; i++) {
  const hole = document.createElement('div');
  hole.className = 'hole';
  hole.innerHTML = '<span class="mole hidden">🐹</span>';
  hole.dataset.index = i;
  hole.addEventListener('click', () => whack(i));
  hole.addEventListener('touchend', e => { e.preventDefault(); whack(i); });
  grid.appendChild(hole);
  holes.push(hole);
}

function whack(i) {
  if (!gameRunning || activeMole !== i) return;
  score++;
  document.getElementById('scoreEl').textContent = score;
  holes[i].classList.add('hit');
  setTimeout(() => holes[i].classList.remove('hit'), 200);
  hideMole();
  clearTimeout(moleTimeout);
  scheduleMole();
}

function showMole() {
  const idx = Math.floor(Math.random() * 9);
  activeMole = idx;
  holes[idx].classList.add('active');
  holes[idx].querySelector('.mole').classList.remove('hidden');

  const duration = Math.max(600, 1200 - score * 20);
  moleTimeout = setTimeout(() => {
    if (activeMole === idx) {
      miss++;
      document.getElementById('missEl').textContent = miss;
      hideMole();
      scheduleMole();
    }
  }, duration);
}

function hideMole() {
  if (activeMole >= 0) {
    holes[activeMole].classList.remove('active');
    holes[activeMole].querySelector('.mole').classList.add('hidden');
    activeMole = -1;
  }
}

function scheduleMole() {
  if (!gameRunning) return;
  const delay = Math.max(200, 600 - score * 10);
  moleTimer = setTimeout(showMole, delay);
}

function startGame() {
  score = 0; miss = 0; timeLeft = GAME_TIME; gameRunning = true;
  document.getElementById('scoreEl').textContent = 0;
  document.getElementById('missEl').textContent = 0;
  document.getElementById('timeEl').textContent = GAME_TIME;
  document.getElementById('timeBar').style.width = '100%';
  document.getElementById('overlay').classList.add('hidden');

  scheduleMole();
  countdownTimer = setInterval(() => {
    timeLeft--;
    document.getElementById('timeEl').textContent = timeLeft;
    document.getElementById('timeBar').style.width = (timeLeft / GAME_TIME * 100) + '%';
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  gameRunning = false;
  clearTimeout(moleTimer);
  clearTimeout(moleTimeout);
  clearInterval(countdownTimer);
  hideMole();

  const overlay = document.getElementById('overlay');
  overlay.querySelector('.overlay-emoji').textContent = score >= 20 ? '🏆' : score >= 10 ? '🎉' : '😅';
  overlay.querySelector('.overlay-title').textContent = '게임 종료!';
  overlay.querySelector('.overlay-score').textContent = `점수: ${score}점 | 놓침: ${miss}회`;
  document.getElementById('startBtn').textContent = '다시 하기';
  overlay.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click', startGame);
</script>
</body>
</html>

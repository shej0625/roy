<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>다람쥐 날리기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0a1a 0%, #1a0a3a 100%);
  color: #fff;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column; align-items: center;
  padding: 20px; overflow-y: auto;
}
.screen.active { display: flex; }
h2 {
  font-size: 1.6rem; font-weight: 800;
  background: linear-gradient(135deg, #a78bfa, #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px; text-align: center;
}
.subtitle { color: #9ca3af; font-size: 0.85rem; margin-bottom: 24px; text-align: center; }
.card-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; width: 100%; max-width: 380px;
}
.char-card, .item-card {
  background: #1e1b4b; border: 2px solid #312e81;
  border-radius: 16px; padding: 16px 12px;
  text-align: center; cursor: pointer;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.char-card:active, .item-card:active { transform: scale(0.96); }
.char-card.selected, .item-card.selected {
  border-color: #a78bfa;
  background: #2d2568;
  box-shadow: 0 0 20px #a78bfa44;
}
.card-emoji { font-size: 2.4rem; margin-bottom: 6px; }
.card-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }
.stat-bar-wrap { text-align: left; }
.stat-label { font-size: 0.68rem; color: #9ca3af; margin-bottom: 2px; }
.stat-bar { height: 5px; background: #312e81; border-radius: 3px; margin-bottom: 5px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #a78bfa, #fbbf24); }
.item-desc { font-size: 0.7rem; color: #9ca3af; margin-top: 6px; line-height: 1.4; }
.btn {
  margin-top: 20px; padding: 14px 40px;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  border: none; border-radius: 50px; color: #fff;
  font-size: 1.1rem; font-weight: 700; cursor: pointer;
  transition: all 0.2s; -webkit-tap-highlight-color: transparent;
  opacity: 0.4; pointer-events: none;
}
.btn.enabled { opacity: 1; pointer-events: all; }
.btn.enabled:active { transform: scale(0.96); }
#gameScreen { padding: 0; }
canvas#gameCanvas { display: block; touch-action: none; }
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; background: rgba(0,0,0,0.5);
  font-size: 0.85rem; font-weight: 700; z-index: 10;
  pointer-events: none;
}
.hud-item { display: flex; flex-direction: column; align-items: center; }
.hud-val { font-size: 1.1rem; color: #fbbf24; }
.hud-lbl { font-size: 0.65rem; color: #9ca3af; }
#aimPanel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); padding: 16px;
  z-index: 10; display: none;
}
.aim-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.aim-lbl { font-size: 0.8rem; color: #9ca3af; width: 60px; }
.aim-val { font-size: 0.9rem; font-weight: 700; color: #fbbf24; width: 40px; }
input[type=range] {
  flex: 1; -webkit-appearance: none; height: 6px;
  background: #312e81; border-radius: 3px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  border-radius: 50%; background: #a78bfa; cursor: pointer;
}
#launchBtn {
  width: 100%; padding: 14px; font-size: 1.2rem; font-weight: 800;
  background: linear-gradient(135deg, #f59e0b, #fbbf24);
  border: none; border-radius: 50px; color: #1a0a3a; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#launchBtn:active { transform: scale(0.97); }
#resultScreen { justify-content: center; }
.result-emoji { font-size: 5rem; margin-bottom: 12px; }
.result-stat { font-size: 1rem; color: #d1d5db; margin: 6px 0; }
.result-stat span { color: #fbbf24; font-weight: 700; font-size: 1.2rem; }
.back-btn {
  margin-top: 28px; padding: 14px 48px;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  border: none; border-radius: 50px; color: #fff;
  font-size: 1.1rem; font-weight: 700; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.back-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<!-- Screen 1: Character Select -->
<div id="charScreen" class="screen active">
  <h2>🐿️ 다람쥐 날리기</h2>
  <p class="subtitle">캐릭터를 선택하세요!</p>
  <div class="card-grid" id="charGrid"></div>
  <button class="btn" id="charNextBtn" onclick="goToItemScreen()">다음 →</button>
</div>

<!-- Screen 2: Item Select -->
<div id="itemScreen" class="screen">
  <h2>🎒 아이템 선택</h2>
  <p class="subtitle">2개를 선택하세요!</p>
  <div class="card-grid" id="itemGrid"></div>
  <button class="btn" id="itemNextBtn" onclick="startGame()">출발! 🚀</button>
</div>

<!-- Screen 3: Game -->
<div id="gameScreen" class="screen">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="hud-item"><span class="hud-val" id="hudAlt">0.00</span><span class="hud-lbl">고도 km</span></div>
    <div class="hud-item"><span class="hud-val" id="hudDist">0.00</span><span class="hud-lbl">거리 km</span></div>
    <div class="hud-item"><span class="hud-val" id="hudCoins">0</span><span class="hud-lbl">코인 🪙</span></div>
  </div>
  <div id="aimPanel">
    <div class="aim-row">
      <span class="aim-lbl">각도</span>
      <input type="range" id="angleSlider" min="0" max="90" value="45" oninput="updateAim()">
      <span class="aim-val" id="angleVal">45°</span>
    </div>
    <div class="aim-row">
      <span class="aim-lbl">파워</span>
      <input type="range" id="powerSlider" min="1" max="100" value="80" oninput="updateAim()">
      <span class="aim-val" id="powerVal">80%</span>
    </div>
    <button id="launchBtn" onclick="launch()">🚀 발사!</button>
  </div>
</div>

<!-- Screen 4: Result -->
<div id="resultScreen" class="screen">
  <div class="result-emoji" id="resultEmoji">🏆</div>
  <h2>결과!</h2>
  <div class="result-stat">최대 고도: <span id="reMaxAlt">0</span> km</div>
  <div class="result-stat">최대 거리: <span id="reMaxDist">0</span> km</div>
  <div class="result-stat">코인 수집: <span id="reCoins">0</span> 개</div>
  <button class="back-btn" onclick="showScreen('charScreen')">다시 하기</button>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────
const CHARS = [
  { emoji:'🐿️', name:'다람쥐', desc:'균형', speed:100, gravity:100, drag:100, bounce:100 },
  { emoji:'🐹', name:'햄스터', desc:'가볍고 빠름', speed:120, gravity:80, drag:95, bounce:100 },
  { emoji:'🐰', name:'토끼', desc:'높이 점프', speed:100, gravity:90, drag:100, bounce:130 },
  { emoji:'🐱', name:'고양이', desc:'저항 낮음', speed:110, gravity:100, drag:92, bounce:100 },
];
const ITEMS = [
  { emoji:'🚀', name:'로켓부스터', desc:'발사 속도 ×2', id:'rocket' },
  { emoji:'🪶', name:'깃털', desc:'중력 ×0.6', id:'feather' },
  { emoji:'🌀', name:'스프링', desc:'착지 시 반동', id:'spring' },
  { emoji:'🧲', name:'자석', desc:'자동 아이템 수집', id:'magnet' },
  { emoji:'🎈', name:'풍선', desc:'하강 속도 감소', id:'balloon' },
];
const WORLD_ITEMS = [
  { emoji:'🪙', type:'coin', coinVal:1 },
  { emoji:'🌟', type:'star', coinVal:5 },
  { emoji:'🚀', type:'boost', coinVal:0 },
  { emoji:'⚡', type:'speed', coinVal:0 },
  { emoji:'🛸', type:'ufo', coinVal:0 },
];

let selectedChar = 0;
let selectedItems = [];
let game = {};

// ─── SCREENS ────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── CHAR SCREEN ────────────────────────────────────────────────────────
(function buildCharGrid() {
  const grid = document.getElementById('charGrid');
  CHARS.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'char-card' + (i === 0 ? ' selected' : '');
    div.innerHTML = `
      <div class="card-emoji">${c.emoji}</div>
      <div class="card-name">${c.name}</div>
      <div class="stat-bar-wrap">
        <div class="stat-label">속도</div>
        <div class="stat-bar"><div class="stat-fill" style="width:${c.speed}%"></div></div>
        <div class="stat-label">중력저항</div>
        <div class="stat-bar"><div class="stat-fill" style="width:${100 - c.gravity + 50}%"></div></div>
      </div>`;
    div.onclick = () => {
      document.querySelectorAll('.char-card').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
      selectedChar = i;
      document.getElementById('charNextBtn').classList.add('enabled');
    };
    grid.appendChild(div);
  });
  document.getElementById('charNextBtn').classList.add('enabled');
})();

function goToItemScreen() {
  selectedItems = [];
  document.querySelectorAll('.item-card').forEach(d => d.classList.remove('selected'));
  document.getElementById('itemNextBtn').classList.remove('enabled');
  showScreen('itemScreen');
}

// ─── ITEM SCREEN ─────────────────────────────────────────────────────────
(function buildItemGrid() {
  const grid = document.getElementById('itemGrid');
  ITEMS.forEach((it, i) => {
    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <div class="card-emoji">${it.emoji}</div>
      <div class="card-name">${it.name}</div>
      <div class="item-desc">${it.desc}</div>`;
    div.onclick = () => {
      if (div.classList.contains('selected')) {
        div.classList.remove('selected');
        selectedItems = selectedItems.filter(x => x !== it.id);
      } else if (selectedItems.length < 2) {
        div.classList.add('selected');
        selectedItems.push(it.id);
      }
      const btn = document.getElementById('itemNextBtn');
      if (selectedItems.length === 2) btn.classList.add('enabled');
      else btn.classList.remove('enabled');
    };
    grid.appendChild(div);
  });
})();

// ─── GAME ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let raf = null;

function startGame() {
  showScreen('gameScreen');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('aimPanel').style.display = 'block';
  resizeCanvas();
  initGame();
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { if (game.state) { resizeCanvas(); } });

function initGame() {
  const ch = CHARS[selectedChar];
  const baseSpeed = 1000 * (ch.speed / 100);
  const hasRocket = selectedItems.includes('rocket');
  const speed = hasRocket ? baseSpeed * 2 : baseSpeed;

  game = {
    state: 'aim',
    char: ch,
    items: [...selectedItems],
    // physics
    wx: 200, wy: 0,   // world position (wy positive = up from ground)
    vx: 0, vy: 0,
    baseSpeed: speed,
    gravity: 350 * (ch.gravity / 100) * (selectedItems.includes('feather') ? 0.6 : 1),
    drag: 0.998 * (ch.drag / 100),
    // stats
    maxAlt: 0, maxDist: 0, coins: 0,
    bounced: false,
    // world items
    worldItems: [],
    // camera
    camX: 0, camY: 0,
    // stars/planets
    stars: Array.from({length:200}, () => ({ x: Math.random()*8000, y: Math.random()*30000+5000, r: Math.random()*1.5+0.5 })),
    planets: [
      { x: 3000, y: 18000, r: 60, color: '#c084fc' },
      { x: 6000, y: 25000, r: 90, color: '#fb923c' },
    ],
    clouds: Array.from({length:15}, () => ({
      x: Math.random()*10000, y: Math.random()*4500+200,
      w: Math.random()*120+60, layer: Math.floor(Math.random()*3)
    })),
  };
  spawnWorldItems();
  updateAim();
  if (raf) cancelAnimationFrame(raf);
  draw();
}

function spawnWorldItems() {
  for (let i = 0; i < 80; i++) {
    const t = WORLD_ITEMS[Math.floor(Math.random() * WORLD_ITEMS.length)];
    game.worldItems.push({
      ...t,
      wx: 500 + Math.random() * 12000,
      wy: 200 + Math.random() * 28000,
      collected: false,
    });
  }
}

function updateAim() {
  const a = parseInt(document.getElementById('angleSlider').value);
  const p = parseInt(document.getElementById('powerSlider').value);
  document.getElementById('angleVal').textContent = a + '°';
  document.getElementById('powerVal').textContent = p + '%';
  game.launchAngle = a * Math.PI / 180;
  game.launchPower = p / 100;
}

function launch() {
  if (game.state !== 'aim') return;
  game.state = 'flying';
  const spd = game.baseSpeed * game.launchPower;
  game.vx = spd * Math.cos(game.launchAngle);
  game.vy = spd * Math.sin(game.launchAngle);
  document.getElementById('aimPanel').style.display = 'none';
  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    update(dt);
    draw();
    if (game.state === 'flying') raf = requestAnimationFrame(loop);
  }
  raf = requestAnimationFrame(loop);
}

function update(dt) {
  if (game.state !== 'flying') return;

  // Balloon: slow descent
  if (game.items.includes('balloon') && game.vy < 0) {
    game.vy *= 0.97;
  }

  // Apply gravity (vy positive = up in game coords, but we flip for display)
  game.vy -= game.gravity * dt;

  // Drag
  game.vx *= Math.pow(game.drag, dt * 60);
  game.vy *= Math.pow(game.drag, dt * 60);

  game.wx += game.vx * dt;
  game.wy += game.vy * dt;

  if (game.wy > game.maxAlt) game.maxAlt = game.wy;
  if (game.wx > game.maxDist) game.maxDist = game.wx;

  // Update HUD
  document.getElementById('hudAlt').textContent = (game.wy / 3000).toFixed(2);
  document.getElementById('hudDist').textContent = (game.wx / 3000).toFixed(2);
  document.getElementById('hudCoins').textContent = game.coins;

  // Collect world items
  const collectR = game.items.includes('magnet') ? 100 : 30;
  for (const wi of game.worldItems) {
    if (wi.collected) continue;
    const dx = wi.wx - game.wx, dy = wi.wy - game.wy;
    if (Math.sqrt(dx*dx+dy*dy) < collectR) {
      wi.collected = true;
      game.coins += wi.coinVal || 0;
      if (wi.type === 'boost') { game.vx += 400; game.vy += 400; }
      if (wi.type === 'speed') { const spd = Math.sqrt(game.vx*game.vx+game.vy*game.vy); const nx=game.vx/spd, ny=game.vy/spd; game.vx=(spd+300)*nx; game.vy=(spd+300)*ny; }
      if (wi.type === 'ufo') { game.vy = 600; }
    }
  }

  // Landing
  if (game.wy <= 0 && game.vy < 0) {
    if (game.items.includes('spring') && !game.bounced) {
      game.wy = 0; game.vy = 600; game.bounced = true;
    } else {
      game.wy = 0; game.vy = 0; game.vx = 0;
      game.state = 'landed';
      setTimeout(showResult, 600);
    }
  }
}

function draw() {
  const W = canvas.width, H = canvas.height;
  const alt = game.wy;

  // Camera: center char on screen
  const screenCharX = W * 0.3;
  const screenCharY = H * 0.5;
  game.camX = game.wx - screenCharX;
  game.camY = game.wy - (H - screenCharY);  // wy up, screen y down

  ctx.clearRect(0, 0, W, H);

  // Sky gradient based on altitude
  let skyTop, skyBot;
  if (alt < 500) {
    const t = alt / 500;
    skyTop = lerpColor('#0a1628', '#0a1a4a', t);
    skyBot = lerpColor('#0d3b8c', '#0a1a3a', t);
  } else if (alt < 2000) {
    const t = (alt-500)/1500;
    skyTop = lerpColor('#0a1a4a','#04091e',t);
    skyBot = lerpColor('#0a1a3a','#04091e',t);
  } else if (alt < 8000) {
    const t = (alt-2000)/6000;
    skyTop = lerpColor('#04091e','#0a001a',t);
    skyBot = lerpColor('#04091e','#0a001a',t);
  } else {
    skyTop = '#000005'; skyBot = '#000005';
  }
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, skyTop); grad.addColorStop(1, skyBot);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Ground
  if (alt < 3000) {
    const groundWorldY = 0;
    const groundScreenY = worldToScreenY(groundWorldY);
    if (groundScreenY < H + 100) {
      ctx.fillStyle = '#1a4a1a';
      ctx.fillRect(0, groundScreenY, W, H - groundScreenY + 100);
      ctx.fillStyle = '#2d7a2d';
      ctx.fillRect(0, groundScreenY, W, 8);
    }
  }

  // Stars
  if (alt > 3000) {
    const opacity = Math.min(1, (alt - 3000) / 5000);
    ctx.globalAlpha = opacity;
    for (const s of game.stars) {
      const sx = s.x - game.camX * 0.3;
      const sy = worldToScreenY(s.y);
      if (sx > -5 && sx < W+5 && sy > -5 && sy < H+5) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(((sx % W) + W) % W, sy, s.r, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  // Planets
  if (alt > 12000) {
    const opacity = Math.min(1, (alt - 12000) / 5000);
    ctx.globalAlpha = opacity;
    for (const p of game.planets) {
      const px = p.x - game.camX * 0.5;
      const py = worldToScreenY(p.y);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(((px % (W*2)) + W*2) % W, py, p.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Clouds
  if (alt < 5000) {
    const opacity = Math.max(0, 1 - alt / 5000);
    ctx.globalAlpha = opacity * 0.7;
    for (const cl of game.clouds) {
      const parallax = [0.1, 0.3, 0.6][cl.layer];
      const cx = cl.x - game.camX * parallax;
      const cy = worldToScreenY(cl.y);
      const screenX = ((cx % (W * 3)) + W * 3) % (W * 3) - W;
      if (screenX > -200 && screenX < W + 200 && cy > -50 && cy < H + 50) {
        ctx.fillStyle = '#e0e8ff';
        drawCloud(screenX, cy, cl.w);
      }
    }
    ctx.globalAlpha = 1;
  }

  // World items
  for (const wi of game.worldItems) {
    if (wi.collected) continue;
    const sx = worldToScreenX(wi.wx);
    const sy = worldToScreenY(wi.wy);
    if (sx > -30 && sx < W+30 && sy > -30 && sy < H+30) {
      ctx.font = '20px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(wi.emoji, sx, sy);
    }
  }

  // Catapult (only in aim state)
  if (game.state === 'aim') {
    const cx = worldToScreenX(200);
    const cy = worldToScreenY(0);
    drawCatapult(cx, cy);
  }

  // Character
  const charSX = worldToScreenX(game.wx);
  const charSY = worldToScreenY(game.wy);
  ctx.font = '28px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(CHARS[selectedChar].emoji, charSX, charSY);

  // Aim arc (in aim state)
  if (game.state === 'aim') {
    const cx = worldToScreenX(200);
    const cy = worldToScreenY(0);
    const angle = game.launchAngle || Math.PI/4;
    // Arc
    ctx.strokeStyle = '#a78bfa44';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy - 30, 70, -Math.PI, 0, false);
    ctx.stroke();
    // Angle line
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 30);
    ctx.lineTo(cx + 70 * Math.cos(angle), cy - 30 - 70 * Math.sin(angle));
    ctx.stroke();
  }
}

function worldToScreenX(wx) { return wx - game.camX; }
function worldToScreenY(wy) {
  const H = canvas.height;
  return H - (wy - (game.wy - H * 0.5));
}

function drawCloud(x, y, w) {
  ctx.beginPath();
  ctx.ellipse(x, y, w/2, w/5, 0, 0, Math.PI*2);
  ctx.ellipse(x - w*0.25, y + w*0.05, w/4, w/6, 0, 0, Math.PI*2);
  ctx.ellipse(x + w*0.25, y + w*0.05, w/4, w/6, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawCatapult(x, y) {
  ctx.strokeStyle = '#8b5a2b'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(x, y - 60); ctx.lineTo(x, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - 20, y); ctx.lineTo(x + 20, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y - 60); ctx.lineTo(x - 30, y - 20); ctx.stroke();
  ctx.fillStyle = '#5a3010';
  ctx.beginPath(); ctx.arc(x, y - 60, 8, 0, Math.PI*2); ctx.fill();
}

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
  const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t), g = Math.round(g1 + (g2-g1)*t), b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function showResult() {
  if (raf) { cancelAnimationFrame(raf); raf = null; }
  document.getElementById('hud').style.display = 'none';
  const maxAltKm = game.maxAlt / 3000;
  const maxDistKm = game.maxDist / 3000;
  document.getElementById('reMaxAlt').textContent = maxAltKm.toFixed(2);
  document.getElementById('reMaxDist').textContent = maxDistKm.toFixed(2);
  document.getElementById('reCoins').textContent = game.coins;
  let emoji = '😅';
  if (maxAltKm > 10) emoji = '🏆';
  else if (maxAltKm > 5) emoji = '🚀';
  else if (maxAltKm > 1) emoji = '🌟';
  document.getElementById('resultEmoji').textContent = emoji;
  showScreen('resultScreen');
}

// Initial aim draw
window.addEventListener('load', () => {
  resizeCanvas();
  game.state = 'aim';
  game.wy = 0; game.wx = 200;
  game.launchAngle = Math.PI/4;
  game.launchPower = 0.8;
  game.camX = 0; game.camY = 0;
  game.clouds = [];
  game.worldItems = [];
  game.stars = [];
  game.planets = [];
});
</script>

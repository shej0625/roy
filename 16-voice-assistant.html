<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>헤이 로이 - 음성 어시스턴트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Setup ── */
    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 28px 24px;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 400px;
      width: 92%;
    }

    .setup-screen h2 { font-size: 1.4rem; color: #a78bfa; }
    .setup-screen .sub { font-size: 0.82rem; color: #64748b; text-align: center; }

    /* Provider tabs */
    .provider-tabs {
      display: flex; width: 100%;
      background: rgba(255,255,255,0.05);
      border-radius: 12px; padding: 4px; gap: 4px;
    }
    .tab-btn {
      flex: 1; padding: 10px 8px; border-radius: 9px;
      border: none; cursor: pointer;
      font-size: 0.88rem; font-weight: 600;
      transition: all 0.2s;
      background: transparent; color: #64748b;
    }
    .tab-btn.active {
      color: #fff;
    }
    .tab-btn.gemini.active { background: linear-gradient(135deg, #1a73e8, #34a853); }
    .tab-btn.claude.active { background: linear-gradient(135deg, #7c3aed, #4f46e5); }

    /* Free badge */
    .free-badge {
      display: inline-block;
      background: linear-gradient(135deg, #34a853, #0d9488);
      color: #fff; font-size: 0.6rem; font-weight: 900;
      padding: 2px 6px; border-radius: 8px; margin-left: 4px;
      vertical-align: middle; letter-spacing: 0.5px;
    }

    .provider-info {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      font-size: 0.8rem; color: #94a3b8; line-height: 1.6;
    }
    .provider-info a { color: #60a5fa; text-decoration: none; }
    .provider-info a:hover { text-decoration: underline; }

    .setup-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(167,139,250,0.3);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }
    .setup-screen input:focus { border-color: #a78bfa; }
    .setup-screen input.gemini-input:focus { border-color: #1a73e8; }

    .start-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      color: #fff;
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .start-btn.gemini { background: linear-gradient(135deg, #1a73e8, #34a853); }
    .start-btn.claude { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
    .start-btn:hover { opacity: 0.85; }

    .wake-hint {
      font-size: 0.74rem; color: #475569; text-align: center;
    }
    .wake-hint strong { color: #a78bfa; }

    /* ── Main ── */
    .main-screen { display: none; flex-direction: column; align-items: center; gap: 28px; width: 100%; }

    .orb-container { position: relative; width: 180px; height: 180px; }

    .orb {
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #c4b5fd, #7c3aed 50%, #312e81);
      box-shadow: 0 0 40px rgba(124,58,237,0.5);
      cursor: pointer;
      transition: transform 0.2s;
      position: relative; z-index: 2;
    }
    .orb:hover { transform: scale(1.05); }

    .ring {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(167,139,250,0.3);
      animation: none;
    }
    .ring-1 { width: 220px; height: 220px; }
    .ring-2 { width: 270px; height: 270px; border-color: rgba(167,139,250,0.15); }

    @keyframes pulse-ring {
      0%   { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.1);  opacity: 0; }
    }
    .orb-container.listening .ring   { animation: pulse-ring 1.2s ease-out infinite; }
    .orb-container.listening .ring-2 { animation: pulse-ring 1.2s ease-out 0.4s infinite; }
    .orb-container.listening .orb    { box-shadow: 0 0 70px rgba(124,58,237,0.9); }

    .orb-container.speaking .orb {
      animation: orb-speak 0.5s ease-in-out infinite alternate;
    }
    @keyframes orb-speak {
      from { transform: scale(1);    box-shadow: 0 0 40px rgba(124,58,237,0.5); }
      to   { transform: scale(1.08); box-shadow: 0 0 80px rgba(167,139,250,0.9); }
    }

    .wave-bars {
      display: flex; align-items: center; justify-content: center;
      gap: 4px; height: 40px;
      opacity: 0; transition: opacity 0.3s;
    }
    .wave-bars.active { opacity: 1; }
    .bar {
      width: 4px; border-radius: 2px;
      background: linear-gradient(to top, #7c3aed, #a78bfa);
      height: 6px;
    }
    @keyframes wave-anim {
      0%, 100% { height: 6px; }
      50%       { height: 30px; }
    }
    .wave-bars.active .bar:nth-child(1) { animation: wave-anim 0.6s ease-in-out 0.0s infinite; }
    .wave-bars.active .bar:nth-child(2) { animation: wave-anim 0.6s ease-in-out 0.1s infinite; }
    .wave-bars.active .bar:nth-child(3) { animation: wave-anim 0.6s ease-in-out 0.2s infinite; }
    .wave-bars.active .bar:nth-child(4) { animation: wave-anim 0.6s ease-in-out 0.1s infinite; }
    .wave-bars.active .bar:nth-child(5) { animation: wave-anim 0.6s ease-in-out 0.0s infinite; }

    .status-label {
      font-size: 1rem; color: #94a3b8;
      text-align: center; min-height: 24px;
      transition: color 0.3s;
    }
    .status-label.active { color: #a78bfa; }

    .transcript {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 18px;
      max-width: 480px; width: 90%;
      min-height: 52px;
      font-size: 0.92rem; line-height: 1.6;
      color: #e2e8f0; text-align: center;
      display: none;
    }
    .transcript.visible { display: block; }
    .transcript .role { font-size: 0.72rem; color: #64748b; margin-bottom: 4px; }

    .history {
      max-width: 480px; width: 90%;
      max-height: 180px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .history::-webkit-scrollbar { width: 4px; }
    .history::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 2px; }

    .msg {
      padding: 9px 13px; border-radius: 12px;
      font-size: 0.83rem; line-height: 1.5;
    }
    .msg.user      { background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.3); align-self: flex-end;  color: #c4b5fd; }
    .msg.assistant { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); align-self: flex-start; color: #e2e8f0; }

    .hint { font-size: 0.76rem; color: #475569; text-align: center; }
    .hint kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 2px 6px; border-radius: 4px;
    }

    .settings-btn {
      position: fixed; top: 16px; right: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #64748b; border-radius: 50%;
      width: 36px; height: 36px;
      cursor: pointer; font-size: 1rem;
      display: none; align-items: center; justify-content: center;
      transition: color 0.2s;
    }
    .settings-btn:hover { color: #a78bfa; }

    .provider-chip {
      position: fixed; top: 16px; left: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #64748b; border-radius: 20px;
      padding: 4px 10px; font-size: 0.72rem;
      display: none;
    }
  </style>
</head>
<body>

<!-- Setup -->
<div class="setup-screen" id="setupScreen">
  <h2>🎙 헤이 로이</h2>

  <div class="provider-tabs">
    <button class="tab-btn gemini active" id="tabGemini" onclick="selectProvider('gemini')">
      Gemini <span class="free-badge">무료</span>
    </button>
    <button class="tab-btn claude" id="tabClaude" onclick="selectProvider('claude')">
      Claude
    </button>
  </div>

  <div class="provider-info" id="providerInfo">
    <strong style="color:#34a853">Google Gemini</strong> — 무료로 사용 가능!<br>
    1. <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> 접속<br>
    2. <strong>Create API key</strong> 클릭 → 복사<br>
    3. 아래에 붙여넣기
  </div>

  <input type="password" id="apiKeyInput" placeholder="API 키를 입력하세요" autocomplete="off" />

  <div class="wake-hint">웨이크워드: <strong>"헤이 로이"</strong> 또는 <strong>"hey roy"</strong></div>

  <button class="start-btn gemini" id="startBtn" onclick="handleStart()">시작하기</button>
</div>

<!-- Main -->
<div class="main-screen" id="mainScreen">
  <div class="orb-container" id="orbContainer">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="orb" id="orb" title="클릭해서 말하기"></div>
  </div>

  <div class="wave-bars" id="waveBars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>

  <div class="status-label" id="statusLabel">"헤이 로이"라고 불러보세요</div>

  <div class="transcript" id="transcript">
    <div class="role" id="transcriptRole"></div>
    <div id="transcriptText"></div>
  </div>

  <div class="history" id="history"></div>

  <div class="hint">오브를 클릭하거나 <kbd>스페이스</kbd>를 눌러도 돼요</div>
</div>

<div class="provider-chip" id="providerChip"></div>
<button class="settings-btn" id="settingsBtn" title="설정">⚙</button>

<script>
  const STORAGE_KEY_PROVIDER = 'heyroy_provider';
  const STORAGE_KEY_GEMINI   = 'heyroy_gemini_key';
  const STORAGE_KEY_CLAUDE   = 'heyroy_claude_key';

  let provider = 'gemini';
  let apiKey = '';
  let recognition = null;
  let isListeningForWake = false;
  let isCapturing = false;
  let isSpeaking = false;
  let conversationHistory = [];
  let captureTimeout = null;
  let pendingTranscript = '';

  const $ = id => document.getElementById(id);

  // Restore saved state
  provider = localStorage.getItem(STORAGE_KEY_PROVIDER) || 'gemini';
  selectProvider(provider, true);
  const savedKey = localStorage.getItem(provider === 'gemini' ? STORAGE_KEY_GEMINI : STORAGE_KEY_CLAUDE);
  if (savedKey) $('apiKeyInput').value = savedKey;

  function selectProvider(p, silent) {
    provider = p;
    $('tabGemini').classList.toggle('active', p === 'gemini');
    $('tabClaude').classList.toggle('active', p === 'claude');
    $('startBtn').className = 'start-btn ' + p;
    $('apiKeyInput').className = p === 'gemini' ? 'gemini-input' : '';

    if (p === 'gemini') {
      $('apiKeyInput').placeholder = 'AIza... (Google AI Studio 키)';
      $('providerInfo').innerHTML = `
        <strong style="color:#34a853">Google Gemini</strong> — 무료로 사용 가능!<br>
        1. <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> 접속<br>
        2. <strong>Create API key</strong> 클릭 → 복사<br>
        3. 아래에 붙여넣기
      `;
    } else {
      $('apiKeyInput').placeholder = 'sk-ant-... (Anthropic 키)';
      $('providerInfo').innerHTML = `
        <strong style="color:#a78bfa">Claude (Anthropic)</strong> — 유료 API<br>
        1. <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> 접속<br>
        2. API Keys → <strong>Create Key</strong><br>
        3. 크레딧 충전 후 사용
      `;
    }

    if (!silent) {
      const stored = localStorage.getItem(p === 'gemini' ? STORAGE_KEY_GEMINI : STORAGE_KEY_CLAUDE);
      $('apiKeyInput').value = stored || '';
    }
  }

  function handleStart() {
    const key = $('apiKeyInput').value.trim();
    if (!key) { alert('API 키를 입력하세요.'); return; }

    if (provider === 'claude' && !key.startsWith('sk-ant-')) {
      alert('Claude 키는 sk-ant- 로 시작해야 해요.'); return;
    }
    if (provider === 'gemini' && !key.startsWith('AIza')) {
      alert('Gemini 키는 AIza 로 시작해야 해요.\naistudio.google.com/apikey 에서 발급받으세요.'); return;
    }

    apiKey = key;
    localStorage.setItem(STORAGE_KEY_PROVIDER, provider);
    localStorage.setItem(provider === 'gemini' ? STORAGE_KEY_GEMINI : STORAGE_KEY_CLAUDE, key);
    startApp();
  }

  $('settingsBtn').addEventListener('click', () => {
    stopAll();
    $('setupScreen').style.display = 'flex';
    $('mainScreen').style.display = 'none';
    $('settingsBtn').style.display = 'none';
    $('providerChip').style.display = 'none';
    conversationHistory = [];
    $('history').innerHTML = '';
  });

  $('orb').addEventListener('click', () => {
    if (isSpeaking) { stopSpeech(); return; }
    if (!isCapturing) triggerCapture();
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      if (isSpeaking) { stopSpeech(); return; }
      if (!isCapturing) triggerCapture();
    }
  });

  function startApp() {
    $('setupScreen').style.display = 'none';
    $('mainScreen').style.display = 'flex';
    $('settingsBtn').style.display = 'flex';
    $('providerChip').style.display = 'block';
    $('providerChip').textContent = provider === 'gemini' ? '⚡ Gemini 무료' : '✦ Claude';
    initSpeechRecognition();
  }

  function initSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setStatus('이 브라우저는 음성 인식을 지원하지 않아요 (Chrome 권장)', false);
      return;
    }

    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = handleResult;
    recognition.onerror = e => {
      if (e.error === 'no-speech' || e.error === 'audio-capture') return;
      console.warn('SR error:', e.error);
    };
    recognition.onend = () => {
      if (!isCapturing && !isSpeaking) {
        try { recognition.start(); } catch(e) {}
      }
    };

    startWakeWordListening();
  }

  function startWakeWordListening() {
    isListeningForWake = true;
    isCapturing = false;
    setStatus('"헤이 로이"라고 불러보세요', false);
    setOrbState('idle');
    try { recognition.start(); } catch(e) {}
  }

  function handleResult(event) {
    let finalText = '';
    let interimText = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const text = event.results[i][0].transcript.toLowerCase().trim();
      if (event.results[i].isFinal) finalText += text;
      else interimText += text;
    }

    const combined = (finalText || interimText).replace(/\s+/g, ' ').trim();

    if (isListeningForWake && !isCapturing) {
      const wakeWords = ['헤이 로이', '헤이로이', 'hey roy', 'hey, roy', '헤이로', '헤이 로'];
      if (wakeWords.some(w => combined.includes(w))) triggerCapture();
      return;
    }

    if (isCapturing) {
      clearTimeout(captureTimeout);
      pendingTranscript = combined;
      showTranscript('나', combined);

      if (finalText) {
        captureTimeout = setTimeout(() => processCommand(pendingTranscript), 800);
      } else {
        captureTimeout = setTimeout(() => {
          if (pendingTranscript) processCommand(pendingTranscript);
        }, 2500);
      }
    }
  }

  function triggerCapture() {
    if (isCapturing || isSpeaking) return;
    isCapturing = true;
    isListeningForWake = false;
    pendingTranscript = '';
    setOrbState('listening');
    setStatus('듣고 있어요...', true);
    hideTranscript();
    $('waveBars').classList.add('active');

    captureTimeout = setTimeout(() => {
      if (!pendingTranscript) {
        isCapturing = false;
        startWakeWordListening();
        $('waveBars').classList.remove('active');
      }
    }, 8000);
  }

  async function processCommand(text) {
    if (!text.trim()) { startWakeWordListening(); return; }
    clearTimeout(captureTimeout);
    isCapturing = false;
    $('waveBars').classList.remove('active');

    const cleanText = text.replace(/헤이\s*로이?|hey\s*,?\s*roy/gi, '').trim();
    if (!cleanText) { startWakeWordListening(); return; }

    addHistory('user', cleanText);
    showTranscript('나', cleanText);
    setStatus('생각하는 중...', true);
    setOrbState('thinking');
    recognition.stop();

    try {
      const reply = provider === 'gemini' ? await askGemini(cleanText) : await askClaude(cleanText);
      addHistory('assistant', reply);
      showTranscript('로이', reply);
      speak(reply);
    } catch(e) {
      const errMsg = '죄송해요, 오류가 발생했어요: ' + e.message;
      showTranscript('로이', errMsg);
      speak(errMsg);
    }
  }

  async function askGemini(userText) {
    const contents = conversationHistory.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    }));

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: '당신은 "로이"라는 이름의 친근한 한국어 음성 어시스턴트입니다. 짧고 자연스러운 구어체로 대답하세요. 마크다운, 이모지, 특수문자는 사용하지 마세요.' }] },
          contents: [...contents, { role: 'user', parts: [{ text: userText }] }],
          generationConfig: { maxOutputTokens: 300, temperature: 0.8 }
        })
      }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    return data.candidates[0].content.parts[0].text.trim();
  }

  async function askClaude(userText) {
    const messages = conversationHistory.map(m => ({ role: m.role, content: m.content }));
    messages.push({ role: 'user', content: userText });

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 400,
        system: '당신은 "로이"라는 이름의 친근한 한국어 음성 어시스턴트입니다. 짧고 자연스러운 구어체로 대답하세요. 마크다운, 이모지, 특수문자는 사용하지 마세요.',
        messages
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    return data.content[0].text.trim();
  }

  function speak(text) {
    if (!window.speechSynthesis) { startWakeWordListening(); return; }

    isSpeaking = true;
    setOrbState('speaking');
    setStatus('말하는 중... (클릭하면 멈춰요)', true);

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR';
    utter.rate = 1.05;

    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko'));
    if (koVoice) utter.voice = koVoice;

    utter.onend = utter.onerror = () => { isSpeaking = false; startWakeWordListening(); };
    window.speechSynthesis.speak(utter);
  }

  function stopSpeech() {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    startWakeWordListening();
  }

  function stopAll() {
    clearTimeout(captureTimeout);
    window.speechSynthesis?.cancel();
    try { recognition?.stop(); } catch(e) {}
    isSpeaking = false; isCapturing = false; isListeningForWake = false;
    $('waveBars').classList.remove('active');
  }

  function setOrbState(state) {
    $('orbContainer').classList.remove('listening', 'speaking');
    if (state === 'listening') $('orbContainer').classList.add('listening');
    if (state === 'speaking' || state === 'thinking') $('orbContainer').classList.add('speaking');
  }

  function setStatus(text, highlight) {
    $('statusLabel').textContent = text;
    $('statusLabel').classList.toggle('active', !!highlight);
  }

  function showTranscript(role, text) {
    $('transcriptRole').textContent = role;
    $('transcriptText').textContent = text;
    $('transcript').className = 'transcript visible';
  }

  function hideTranscript() { $('transcript').className = 'transcript'; }

  function addHistory(role, content) {
    conversationHistory.push({ role, content });
    if (conversationHistory.length > 20) conversationHistory.splice(0, 2);
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = content;
    $('history').appendChild(div);
    $('history').scrollTop = $('history').scrollHeight;
  }

  window.speechSynthesis?.getVoices();
  window.speechSynthesis?.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
</script>
</body>
</html>

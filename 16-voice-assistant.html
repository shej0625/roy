<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>헤이 로이 - 음성 어시스턴트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 420px;
      width: 90%;
    }

    .setup-screen h2 { font-size: 1.4rem; color: #a78bfa; }
    .setup-screen p { font-size: 0.85rem; color: #94a3b8; text-align: center; }

    .setup-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(167,139,250,0.3);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    .setup-screen input:focus { border-color: #a78bfa; }

    .setup-screen button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .setup-screen button:hover { opacity: 0.85; }

    .main-screen { display: none; flex-direction: column; align-items: center; gap: 32px; width: 100%; }

    /* Orb */
    .orb-container { position: relative; width: 180px; height: 180px; }

    .orb {
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #c4b5fd, #7c3aed 50%, #312e81);
      box-shadow: 0 0 40px rgba(124,58,237,0.5);
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
      z-index: 2;
    }

    .orb:hover { transform: scale(1.05); }

    .ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(167,139,250,0.3);
      animation: none;
    }

    .ring-1 { width: 220px; height: 220px; }
    .ring-2 { width: 270px; height: 270px; border-color: rgba(167,139,250,0.15); }

    @keyframes pulse-ring {
      0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
    }

    .orb-container.listening .ring { animation: pulse-ring 1.2s ease-out infinite; }
    .orb-container.listening .ring-2 { animation: pulse-ring 1.2s ease-out 0.4s infinite; }
    .orb-container.listening .orb { box-shadow: 0 0 70px rgba(124,58,237,0.9); }

    .orb-container.speaking .orb {
      animation: orb-speak 0.5s ease-in-out infinite alternate;
    }
    @keyframes orb-speak {
      from { transform: scale(1); box-shadow: 0 0 40px rgba(124,58,237,0.5); }
      to   { transform: scale(1.08); box-shadow: 0 0 80px rgba(167,139,250,0.9); }
    }

    /* Waveform bars */
    .wave-bars {
      display: flex; align-items: center; justify-content: center;
      gap: 4px; height: 40px;
      opacity: 0; transition: opacity 0.3s;
    }
    .wave-bars.active { opacity: 1; }
    .bar {
      width: 4px; border-radius: 2px;
      background: linear-gradient(to top, #7c3aed, #a78bfa);
      animation: none;
      height: 6px;
    }
    @keyframes wave-anim {
      0%, 100% { height: 6px; }
      50% { height: 30px; }
    }
    .wave-bars.active .bar:nth-child(1) { animation: wave-anim 0.6s ease-in-out 0.0s infinite; }
    .wave-bars.active .bar:nth-child(2) { animation: wave-anim 0.6s ease-in-out 0.1s infinite; }
    .wave-bars.active .bar:nth-child(3) { animation: wave-anim 0.6s ease-in-out 0.2s infinite; }
    .wave-bars.active .bar:nth-child(4) { animation: wave-anim 0.6s ease-in-out 0.1s infinite; }
    .wave-bars.active .bar:nth-child(5) { animation: wave-anim 0.6s ease-in-out 0.0s infinite; }

    .status-label {
      font-size: 1rem; color: #94a3b8;
      text-align: center; min-height: 24px;
      transition: color 0.3s;
    }
    .status-label.active { color: #a78bfa; }

    /* Transcript bubble */
    .transcript {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 20px;
      max-width: 500px; width: 90%;
      min-height: 56px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #e2e8f0;
      text-align: center;
      display: none;
    }
    .transcript.visible { display: block; }
    .transcript .role { font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }

    /* Conversation history */
    .history {
      max-width: 500px; width: 90%;
      max-height: 220px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .history::-webkit-scrollbar { width: 4px; }
    .history::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 2px; }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .msg.user { background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.3); align-self: flex-end; color: #c4b5fd; }
    .msg.assistant { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); align-self: flex-start; color: #e2e8f0; }

    .hint {
      font-size: 0.78rem; color: #475569;
      text-align: center;
    }
    .hint kbd {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 2px 6px; border-radius: 4px;
    }

    .settings-btn {
      position: fixed; top: 16px; right: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #64748b; border-radius: 50%;
      width: 36px; height: 36px;
      cursor: pointer; font-size: 1rem;
      display: none; align-items: center; justify-content: center;
      transition: color 0.2s;
    }
    .settings-btn:hover { color: #a78bfa; }
  </style>
</head>
<body>

<!-- Setup -->
<div class="setup-screen" id="setupScreen">
  <h2>🎙 헤이 로이</h2>
  <p>시작하려면 Anthropic API 키를 입력하세요.<br>키는 브라우저에만 저장되며 외부로 전송되지 않습니다.</p>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
  <p style="font-size:0.75rem;color:#475569">웨이크워드: <strong style="color:#a78bfa">"헤이 로이"</strong> 또는 <strong style="color:#a78bfa">"hey roy"</strong></p>
  <button id="startBtn">시작하기</button>
</div>

<!-- Main -->
<div class="main-screen" id="mainScreen">
  <div class="orb-container" id="orbContainer">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="orb" id="orb" title="클릭해서 말하기"></div>
  </div>

  <div class="wave-bars" id="waveBars">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>

  <div class="status-label" id="statusLabel">"헤이 로이"라고 불러보세요</div>

  <div class="transcript" id="transcript">
    <div class="role" id="transcriptRole"></div>
    <div id="transcriptText"></div>
  </div>

  <div class="history" id="history"></div>

  <div class="hint">오브를 클릭하거나 <kbd>스페이스</kbd>를 눌러도 돼요</div>
</div>

<button class="settings-btn" id="settingsBtn" title="API 키 재설정">⚙</button>

<script>
  const API_KEY_STORAGE = 'heyroy_api_key';

  let apiKey = '';
  let recognition = null;
  let isListeningForWake = false;
  let isCapturing = false;
  let isSpeaking = false;
  let conversationHistory = [];
  let captureTimeout = null;
  let pendingTranscript = '';

  const $ = id => document.getElementById(id);
  const setupScreen = $('setupScreen');
  const mainScreen = $('mainScreen');
  const orbContainer = $('orbContainer');
  const orb = $('orb');
  const waveBars = $('waveBars');
  const statusLabel = $('statusLabel');
  const transcriptEl = $('transcript');
  const transcriptRole = $('transcriptRole');
  const transcriptText = $('transcriptText');
  const historyEl = $('history');
  const settingsBtn = $('settingsBtn');
  const apiKeyInput = $('apiKeyInput');

  // Load saved key
  const savedKey = localStorage.getItem(API_KEY_STORAGE);
  if (savedKey) { apiKeyInput.value = savedKey; }

  $('startBtn').addEventListener('click', () => {
    const key = apiKeyInput.value.trim();
    if (!key.startsWith('sk-ant-')) {
      alert('올바른 Anthropic API 키를 입력하세요 (sk-ant- 로 시작)');
      return;
    }
    apiKey = key;
    localStorage.setItem(API_KEY_STORAGE, key);
    startApp();
  });

  settingsBtn.addEventListener('click', () => {
    stopAll();
    setupScreen.style.display = 'flex';
    mainScreen.style.display = 'none';
    settingsBtn.style.display = 'none';
  });

  orb.addEventListener('click', () => {
    if (isSpeaking) { stopSpeech(); return; }
    if (!isCapturing) triggerCapture();
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      if (isSpeaking) { stopSpeech(); return; }
      if (!isCapturing) triggerCapture();
    }
  });

  function startApp() {
    setupScreen.style.display = 'none';
    mainScreen.style.display = 'flex';
    settingsBtn.style.display = 'flex';
    initSpeechRecognition();
  }

  function initSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setStatus('이 브라우저는 음성 인식을 지원하지 않아요 (Chrome 권장)', false);
      return;
    }

    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    recognition.onresult = handleResult;
    recognition.onerror = e => {
      if (e.error === 'no-speech' || e.error === 'audio-capture') return;
      console.warn('SR error:', e.error);
    };
    recognition.onend = () => {
      if (!isCapturing && !isSpeaking) {
        try { recognition.start(); } catch(e) {}
      }
    };

    startWakeWordListening();
  }

  function startWakeWordListening() {
    isListeningForWake = true;
    isCapturing = false;
    setStatus('"헤이 로이"라고 불러보세요', false);
    setOrbState('idle');
    try { recognition.start(); } catch(e) {}
  }

  function handleResult(event) {
    let finalText = '';
    let interimText = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const text = event.results[i][0].transcript.toLowerCase().trim();
      if (event.results[i].isFinal) finalText += text;
      else interimText += text;
    }

    const combined = (finalText || interimText).replace(/\s+/g, ' ').trim();

    if (isListeningForWake && !isCapturing) {
      const wakeWords = ['헤이 로이', '헤이로이', 'hey roy', 'hey, roy'];
      const detected = wakeWords.some(w => combined.includes(w));
      if (detected) triggerCapture();
      return;
    }

    if (isCapturing) {
      clearTimeout(captureTimeout);
      pendingTranscript = combined;

      showTranscript('나', combined, false);

      if (finalText) {
        captureTimeout = setTimeout(() => processCommand(pendingTranscript), 800);
      } else {
        captureTimeout = setTimeout(() => {
          if (pendingTranscript) processCommand(pendingTranscript);
        }, 2500);
      }
    }
  }

  function triggerCapture() {
    if (isCapturing || isSpeaking) return;
    isCapturing = true;
    isListeningForWake = false;
    pendingTranscript = '';

    setOrbState('listening');
    setStatus('듣고 있어요...', true);
    hideTranscript();
    waveBars.classList.add('active');

    captureTimeout = setTimeout(() => {
      if (!pendingTranscript) {
        isCapturing = false;
        startWakeWordListening();
        waveBars.classList.remove('active');
      }
    }, 8000);
  }

  async function processCommand(text) {
    if (!text.trim()) { startWakeWordListening(); return; }
    clearTimeout(captureTimeout);
    isCapturing = false;
    waveBars.classList.remove('active');

    const cleanText = text.replace(/헤이\s*로이|hey\s*,?\s*roy/gi, '').trim();
    if (!cleanText) { startWakeWordListening(); return; }

    addHistory('user', cleanText);
    showTranscript('나', cleanText, false);
    setStatus('생각하는 중...', true);
    setOrbState('thinking');

    recognition.stop();

    try {
      const reply = await askClaude(cleanText);
      addHistory('assistant', reply);
      showTranscript('로이', reply, true);
      speak(reply);
    } catch(e) {
      const errMsg = '죄송해요, 오류가 발생했어요: ' + e.message;
      showTranscript('로이', errMsg, true);
      speak(errMsg);
    }
  }

  async function askClaude(userText) {
    const messages = conversationHistory.map(m => ({ role: m.role, content: m.content }));

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 512,
        system: '당신은 "로이"라는 이름의 친근하고 유능한 음성 어시스턴트입니다. 짧고 명확하게 한국어로 대답하세요. 음성으로 읽히므로 마크다운, 이모지, 특수문자는 사용하지 마세요. 자연스러운 구어체로 답하세요.',
        messages: messages
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    return data.content[0].text;
  }

  function speak(text) {
    if (!window.speechSynthesis) {
      setStatus('"헤이 로이"라고 불러보세요', false);
      setOrbState('idle');
      startWakeWordListening();
      return;
    }

    isSpeaking = true;
    setOrbState('speaking');
    setStatus('말하는 중... (클릭하면 멈춰요)', true);

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR';
    utter.rate = 1.05;
    utter.pitch = 1;

    const voices = window.speechSynthesis.getVoices();
    const koVoice = voices.find(v => v.lang.startsWith('ko'));
    if (koVoice) utter.voice = koVoice;

    utter.onend = () => {
      isSpeaking = false;
      startWakeWordListening();
    };
    utter.onerror = () => {
      isSpeaking = false;
      startWakeWordListening();
    };

    window.speechSynthesis.speak(utter);
  }

  function stopSpeech() {
    window.speechSynthesis.cancel();
    isSpeaking = false;
    startWakeWordListening();
  }

  function stopAll() {
    clearTimeout(captureTimeout);
    window.speechSynthesis?.cancel();
    try { recognition?.stop(); } catch(e) {}
    isSpeaking = false;
    isCapturing = false;
    isListeningForWake = false;
    waveBars.classList.remove('active');
  }

  function setOrbState(state) {
    orbContainer.classList.remove('listening', 'speaking', 'thinking');
    if (state !== 'idle') orbContainer.classList.add(state === 'thinking' ? 'speaking' : state);
  }

  function setStatus(text, highlight) {
    statusLabel.textContent = text;
    statusLabel.classList.toggle('active', highlight);
  }

  function showTranscript(role, text, isAssistant) {
    transcriptRole.textContent = role;
    transcriptText.textContent = text;
    transcriptEl.className = 'transcript visible';
  }

  function hideTranscript() {
    transcriptEl.className = 'transcript';
  }

  function addHistory(role, content) {
    conversationHistory.push({ role, content });
    if (conversationHistory.length > 20) conversationHistory.splice(0, 2);

    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = content;
    historyEl.appendChild(div);
    historyEl.scrollTop = historyEl.scrollHeight;
  }

  // Load voices on init
  window.speechSynthesis?.getVoices();
  window.speechSynthesis?.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
</script>
</body>
</html>

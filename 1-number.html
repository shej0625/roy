<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>숫자 맞추기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f1a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .back { align-self: flex-start; color: #6c63ff; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; }
  h1 { font-size: 1.6rem; margin-bottom: 6px; }
  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 30px; }
  .card {
    background: #1a1a2e;
    border-radius: 20px;
    padding: 30px 24px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    border: 1px solid #2a2a4a;
  }
  .attempts { color: #6c63ff; font-size: 0.9rem; margin-bottom: 20px; }
  .hint {
    font-size: 1.8rem;
    font-weight: 700;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .hint.high { color: #ff6363; }
  .hint.low { color: #63d4ff; }
  .hint.correct { color: #63ff84; }
  .range-bar {
    background: #2a2a4a;
    border-radius: 8px;
    height: 8px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .range-fill { height: 100%; background: linear-gradient(90deg, #6c63ff, #ff6584); border-radius: 8px; transition: width 0.3s; }
  .number-display {
    font-size: 2.5rem;
    font-weight: 700;
    color: #6c63ff;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }
  .controls { display: flex; gap: 12px; align-items: center; justify-content: center; margin-bottom: 16px; }
  .btn-round {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: none;
    font-size: 1.6rem;
    background: #2a2a4a;
    color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .btn-round:active { background: #6c63ff; }
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 1.1rem;
    font-weight: 600;
    background: linear-gradient(135deg, #6c63ff, #ff6584);
    color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.85; }
  .history { margin-top: 20px; text-align: left; }
  .history h3 { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
  .history-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .hist-item {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .hist-item.h { background: #ff636322; color: #ff6363; border: 1px solid #ff636344; }
  .hist-item.l { background: #63d4ff22; color: #63d4ff; border: 1px solid #63d4ff44; }
  .win-overlay {
    position: fixed; inset: 0;
    background: #0f0f1aee;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    display: none;
  }
  .win-overlay.show { display: flex; }
  .win-emoji { font-size: 4rem; }
  .win-text { font-size: 1.4rem; font-weight: 700; }
  .win-sub { color: #888; font-size: 0.9rem; }
</style>
</head>
<body>
<a class="back" href="index.html">← 게임 목록</a>
<h1>🎯 숫자 맞추기</h1>
<p class="subtitle">1에서 100 사이의 숫자를 맞혀보세요!</p>
<div class="card">
  <p class="attempts">시도 횟수: <span id="count">0</span>번</p>
  <div class="hint" id="hint">숫자를 골라보세요!</div>
  <div class="range-bar"><div class="range-fill" id="rangeFill" style="width:100%"></div></div>
  <div class="number-display" id="numDisplay">50</div>
  <div class="controls">
    <button class="btn-round" id="minus10">-10</button>
    <button class="btn-round" id="minus1">-1</button>
    <button class="btn-round" id="plus1">+1</button>
    <button class="btn-round" id="plus10">+10</button>
  </div>
  <button class="btn" id="guessBtn">이 숫자로 추측!</button>
  <div class="history">
    <h3>추측 기록</h3>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-emoji">🎉</div>
  <div class="win-text" id="winText">정답!</div>
  <div class="win-sub" id="winSub"></div>
  <button class="btn" id="restartBtn" style="max-width:200px">다시 시작</button>
</div>

<script>
let secret = Math.floor(Math.random() * 100) + 1;
let current = 50;
let count = 0;
let low = 1, high = 100;
let history = [];

const numDisplay = document.getElementById('numDisplay');
const hint = document.getElementById('hint');
const countEl = document.getElementById('count');
const rangeFill = document.getElementById('rangeFill');
const historyList = document.getElementById('historyList');

function updateDisplay() {
  numDisplay.textContent = current;
  const pct = ((current - 1) / 99) * 100;
  rangeFill.style.width = pct + '%';
}

document.getElementById('minus10').addEventListener('click', () => { current = Math.max(1, current - 10); updateDisplay(); });
document.getElementById('minus1').addEventListener('click', () => { current = Math.max(1, current - 1); updateDisplay(); });
document.getElementById('plus1').addEventListener('click', () => { current = Math.min(100, current + 1); updateDisplay(); });
document.getElementById('plus10').addEventListener('click', () => { current = Math.min(100, current + 10); updateDisplay(); });

document.getElementById('guessBtn').addEventListener('click', guess);

function guess() {
  count++;
  countEl.textContent = count;

  const item = document.createElement('span');
  item.className = 'hist-item';
  item.textContent = current;

  if (current === secret) {
    hint.textContent = '🎉 정답!';
    hint.className = 'hint correct';
    item.classList.add('l');
    historyList.appendChild(item);
    showWin();
  } else if (current > secret) {
    hint.textContent = '📉 너무 높아요!';
    hint.className = 'hint high';
    item.classList.add('h');
    high = Math.min(high, current - 1);
  } else {
    hint.textContent = '📈 너무 낮아요!';
    hint.className = 'hint low';
    item.classList.add('l');
    low = Math.max(low, current + 1);
  }
  historyList.appendChild(item);
}

function showWin() {
  const overlay = document.getElementById('winOverlay');
  document.getElementById('winText').textContent = `정답은 ${secret}!`;
  document.getElementById('winSub').textContent = `${count}번 만에 맞혔어요! 🎊`;
  overlay.classList.add('show');
}

document.getElementById('restartBtn').addEventListener('click', () => {
  secret = Math.floor(Math.random() * 100) + 1;
  current = 50; count = 0; low = 1; high = 100;
  countEl.textContent = 0;
  hint.textContent = '숫자를 골라보세요!';
  hint.className = 'hint';
  historyList.innerHTML = '';
  updateDisplay();
  document.getElementById('winOverlay').classList.remove('show');
});

updateDisplay();
</script>
</body>
</html>
